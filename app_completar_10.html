<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – Completar 10</title>

<style>

body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    margin:0;
}

/* CONTENEDOR */
.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:20px;
}

.logo-portada{ width:360px; }
.logo-app{ width:150px; }

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* MARCO */
.marco{
    display:grid;
    grid-template-columns: repeat(5,100px);
    grid-template-rows: repeat(2,100px);
    border:4px solid #0d2b45;
}

/* CASILLAS */
.casilla{
    display:flex;
    justify-content:center;
    align-items:center;
    border-right:2px solid #0d2b45;
    border-bottom:2px solid #0d2b45;
}

.casilla:nth-child(5),
.casilla:nth-child(10){ border-right:none; }

.casilla:nth-child(n+6){ border-bottom:none; }

/* PUNTOS */
.punto{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#f44336;
}

/* COMPLETAR */
.verde{
    background:#4CAF50;
}

/* TEXTO */
.numero{
    font-size:90px;
    color:#e53935;
    margin-top:20px;
}

.expresion{
    font-size:50px;
    margin-top:10px;
}

/* FOOTER */
.footer{
    padding:20px;
}

.boton{
    padding:15px 30px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.reloj{
    font-size:70px;
}

.oculto{
    visibility:hidden;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* VOZ */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";
    let voz = speechSynthesis.getVoices().find(v => v.lang.includes("es"));
    if(voz) msg.voice = voz;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* VARIABLES */
let cantidad = 0;
let faltan = 0;
let ejercicio = 0;
let total = 20;
let anterior = -1;

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" class="logo-portada">
                <h2>Completar hasta 10</h2>
                <p>Marco de 10</p>
            </div>

            <div class="main"></div>

            <div class="footer">
                <button class="boton" onclick="iniciar()">Iniciar</button>
            </div>

        </div>
    `;
}

/* INICIO */
function iniciar(){
    ejercicio = 0;
    siguienteEjercicio();
}

/* NUEVO */
function siguienteEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    do{
        cantidad = Math.floor(Math.random()*4)+6; // 6 a 9
    }while(cantidad === anterior);

    anterior = cantidad;
    faltan = 10 - cantidad;

    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" class="logo-app">
                <h2>¿Cuántas faltan para completar 10?</h2>
                <div>Ejercicio ${ejercicio} de ${total}</div>
            </div>

            <div class="main">
                <div id="marco" class="marco oculto"></div>
                <div id="numero" class="numero"></div>
                <div id="expresion" class="expresion"></div>
            </div>

            <div id="footer" class="footer">
                <button class="boton" onclick="mostrarEjercicio()">Iniciar ejercicio</button>
            </div>

        </div>
    `;
}

/* MOSTRAR */
function mostrarEjercicio(){

    let marco = document.getElementById("marco");
    marco.innerHTML = "";
    marco.classList.remove("oculto");

    let arriba = Array(5).fill(0);
    let abajo = Array(5).fill(0);

    let extra = cantidad - 5;
    let arribaCompleta = Math.random() < 0.5;

    if(arribaCompleta){
        arriba = Array(5).fill(1);
        for(let i=0;i<extra;i++) abajo[i]=1;
    }else{
        abajo = Array(5).fill(1);
        for(let i=0;i<extra;i++) arriba[i]=1;
    }

    let distribucion = arriba.concat(abajo);

    distribucion.forEach(v=>{
        let div = document.createElement("div");
        div.className="casilla";
        if(v===1){
            div.innerHTML='<div class="punto"></div>';
        }
        marco.appendChild(div);
    });

    document.getElementById("footer").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultar,3000);
}

/* OCULTAR */
function ocultar(){
    document.getElementById("marco").classList.add("oculto");

    document.getElementById("footer").innerHTML = `
        <button class="boton" onclick="mostrarCantidad()">¿Cuántas hay?</button>
    `;
}

/* CUÁNTAS HAY */
function mostrarCantidad(){

    document.getElementById("marco").classList.remove("oculto");

    document.getElementById("numero").innerText = cantidad;

    hablar("Hay " + cantidad);

    document.getElementById("footer").innerHTML = `
        <button class="boton" onclick="mostrarFaltan()">¿Cuántas faltan para completar 10?</button>
    `;
}

/* CUÁNTAS FALTAN */
function mostrarFaltan(){

    let casillas = document.querySelectorAll(".casilla");

    let contador = 0;

    for(let i=0;i<casillas.length;i++){
        if(casillas[i].innerHTML==="" && contador < faltan){
            casillas[i].innerHTML = '<div class="punto verde"></div>';
            contador++;
        }
    }

    hablar("Faltan " + faltan);

    document.getElementById("expresion").innerText = `${cantidad} y ${faltan} hacen 10`;

    setTimeout(()=>{
        hablar(`${cantidad} y ${faltan} hacen 10`);
    },800);

    document.getElementById("footer").innerHTML = `
        <button class="boton" onclick="siguienteEjercicio()">Siguiente</button>
    `;
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">
            <div class="header">
                <img src="logo.png" class="logo-portada">
                <h2>¡Muy bien!</h2>
            </div>

            <div class="footer">
                <button class="boton" onclick="mostrarPortada()">Volver</button>
            </div>
        </div>
    `;
}

mostrarPortada();

</script>

</body>
</html>
