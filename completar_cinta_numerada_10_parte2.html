<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – Completar cinta parte 2</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

/* LOGO */
.logo{
    width:140px;
    margin-top:20px;
}

/* PORTADA */
.portada{
    margin-top:80px;
}

.boton{
    margin:15px;
    padding:15px 30px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(10,90px);
    justify-content:center;
    margin-top:30px;
}

.casilla{
    width:90px;
    height:90px;
    border:2px solid #1f3b57;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    background:white;
}

/* estados */
.objetivo{
    background:#f6e7a1;
}

.correcto{
    background:#c8e6c9;
}

.incorrecto{
    background:#f5c6c6;
}

/* BANCO */
.banco{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-top:30px;
}

.tarjeta{
    width:90px;
    height:90px;
    background:#f6e7a1;
    border:2px solid #d4c06a;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:grab;
}

/* TEXTO */
h2{
    margin-top:30px;
}

</style>
</head>

<body>

<div id="pantalla"></div>

<script>

/* VOZ */
function hablar(texto){
    let m = new SpeechSynthesisUtterance(texto);
    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang === "es-CL") || voces.find(v => v.lang.startsWith("es"));
    if(voz) m.voice = voz;
    m.rate = 0.9;
    speechSynthesis.speak(m);
}

/* VARIABLES */
let ejercicio = 0;
let total = 6;

let cinta = [];
let respuestas = [];

let objetivos = [];
let indiceObjetivo = 0;

let verificado = false;

/* PORTADA */
function iniciarApp(){
    document.getElementById("pantalla").innerHTML = `
        <div class="portada">
            <img src="logo.png" class="logo">
            <h1>Completar la cinta numerada hasta 10</h1>
            <p>Parte 2</p>
            <button class="boton" onclick="nuevoEjercicio()">INICIAR</button>
        </div>
    `;
}

/* NUEVO EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    verificado = false;

    let nivel = (ejercicio <= 3) ? 1 : 2;

    cinta = Array(10).fill(null);
    respuestas = Array(10).fill(null);

    if(nivel === 1){
        cinta[0]=1;
        cinta[4]=5;
        cinta[9]=10;
    }else{
        cinta[0]=1;
        cinta[9]=10;
    }

    objetivos = [];
    for(let i=0;i<10;i++){
        if(cinta[i]===null) objetivos.push(i);
    }

    objetivos.sort(()=>Math.random()-0.5);
    indiceObjetivo = 0;

    document.getElementById("pantalla").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>Completa la cinta</h2>
        <p>Ejercicio ${ejercicio} de ${total}</p>

        <div id="cinta" class="cinta"></div>
        <div id="banco" class="banco"></div>

        <button id="btnVerificar" class="boton" onclick="verificar()" disabled>Verificar</button>
    `;

    dibujarCinta();
    generarBanco();
    indicarObjetivo();
}

/* DIBUJAR CINTA */
function dibujarCinta(){

    let div = document.getElementById("cinta");
    div.innerHTML="";

    for(let i=0;i<10;i++){

        let c=document.createElement("div");
        c.className="casilla";

        if(i===objetivos[indiceObjetivo] && !verificado){
            c.classList.add("objetivo");
        }

        if(cinta[i]!=null){
            c.innerText=cinta[i];
        }else if(respuestas[i]!=null){
            c.innerText=respuestas[i];
        }

        c.ondragover=e=>e.preventDefault();

        c.ondrop=e=>{
            if(verificado) return;

            let num=parseInt(e.dataTransfer.getData("num"));

            if(i !== objetivos[indiceObjetivo]) return;

            respuestas[i]=num;

            eliminarDelBanco(num);

            indiceObjetivo++;

            dibujarCinta();

            if(indiceObjetivo < objetivos.length){
                indicarObjetivo();
            }else{
                document.getElementById("btnVerificar").disabled=false;
            }
        };

        /* permitir devolver */
        c.onclick=()=>{
            if(verificado) return;

            if(respuestas[i]!=null){
                devolverAlBanco(respuestas[i]);
                respuestas[i]=null;

                indiceObjetivo = objetivos.indexOf(i);

                dibujarCinta();
                indicarObjetivo();
            }
        };

        div.appendChild(c);
    }
}

/* BANCO */
function generarBanco(){

    let banco=document.getElementById("banco");
    banco.innerHTML="";

    let numeros=[];

    for(let i=1;i<=10;i++){
        if(!cinta.includes(i)){
            numeros.push(i);
        }
    }

    numeros.sort(()=>Math.random()-0.5);

    numeros.forEach(n=>{
        let t=document.createElement("div");
        t.className="tarjeta";
        t.innerText=n;
        t.draggable=true;

        t.ondragstart=e=>{
            e.dataTransfer.setData("num",n);
        };

        banco.appendChild(t);
    });
}

function eliminarDelBanco(num){
    let tarjetas=document.querySelectorAll(".tarjeta");
    tarjetas.forEach(t=>{
        if(parseInt(t.innerText)===num){
            t.remove();
        }
    });
}

function devolverAlBanco(num){

    let banco=document.getElementById("banco");

    let t=document.createElement("div");
    t.className="tarjeta";
    t.innerText=num;
    t.draggable=true;

    t.ondragstart=e=>{
        e.dataTransfer.setData("num",num);
    };

    banco.appendChild(t);
}

/* INDICAR OBJETIVO */
function indicarObjetivo(){
    let pos = objetivos[indiceObjetivo]+1;
    hablar("Ubica el número que va en la posición " + pos);
}

/* VERIFICAR */
function verificar(){

    verificado = true;

    let casillas = document.querySelectorAll(".casilla");
    let todoBien = true;

    let nuevasPendientes = [];

    for(let i=0;i<10;i++){

        if(respuestas[i]!=null){

            if(respuestas[i] === i+1){

                casillas[i].classList.add("correcto");

            }else{

                casillas[i].classList.add("incorrecto");
                todoBien = false;

                devolverAlBanco(respuestas[i]);
                respuestas[i] = null;

                nuevasPendientes.push(i);
            }
        }
    }

    if(todoBien){

        hablar("Muy bien, completaste la cinta");

        document.getElementById("btnVerificar").innerText="Siguiente";
        document.getElementById("btnVerificar").onclick=nuevoEjercicio;

    }else{

        hablar("Inténtalo otra vez");

        objetivos = nuevasPendientes;
        indiceObjetivo = 0;
        verificado = false;

        setTimeout(()=>{
            dibujarCinta();
            indicarObjetivo();
        },800);

        document.getElementById("btnVerificar").disabled=true;
    }
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("pantalla").innerHTML = `
        <h1>¡Muy bien!</h1>
        <p>Completaste todas las cintas</p>
        <button class="boton" onclick="reiniciar()">REINICIAR</button>
    `;
}

function reiniciar(){
    ejercicio=0;
    iniciarApp();
}

/* INICIO */
iniciarApp();

</script>

</body>
</html>
