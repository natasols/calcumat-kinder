<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Formar dedos hasta 5</title>

<style>
body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.numero{
    font-size:150px;
    color:#d32f2f;
    margin:10px 0;
}

.manos{
    display:flex;
    justify-content:center;
    gap:60px;
    margin:30px;
}

.mano{
    width:220px;
}

.mano.izq{
    transform: scaleX(-1);
}

.boton{
    padding:14px 22px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-top:20px;
}

.texto{
    font-size:24px;
    margin-top:20px;
}

.contador{
    margin-top:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* 🔊 VOZ */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";
    msg.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* VARIABLES */
let numeros = [2,3,4,5];
let secuencia = [];
let index = 0;
let numeroActual = 0;
let subPaso = 0;
let subPasoDosManos = 0;

/* SECUENCIA */
function generarSecuencia(){
    secuencia = [...numeros];
    for(let i=secuencia.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        [secuencia[i],secuencia[j]] = [secuencia[j],secuencia[i]];
    }
}

/* PORTADA */
function portada(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>Formar cantidades con los dedos</h2>
        <div class="texto">Usa tus manos para representar números</div>
        <button class="boton" onclick="iniciar()">INICIAR</button>
    `;
}

/* INICIO */
function iniciar(){
    generarSecuencia();
    index = 0;
    siguienteNumero();
}

/* NUEVO */
function siguienteNumero(){

    if(index >= secuencia.length){
        mostrarFinal();
        return;
    }

    numeroActual = secuencia[index];
    index++;

    pantallaNumero();
}

/* PANTALLA 1 */
function pantallaNumero(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${index} de 4</div>
        <div class="numero">${numeroActual}</div>
        <div class="texto">Forma el ${numeroActual} con una mano</div>
        <button class="boton" onclick="verificar()">Verificar</button>
    `;

    hablar("Forma el " + numeroActual + " con una mano");
}

/* VERIFICAR */
function verificar(){
    subPaso = 0;
    mostrarFormasUnaMano();
}

/* UNA MANO */
function mostrarFormasUnaMano(){

    let formas = [];

    if(numeroActual == 2){
        formas = ["mano_2.png","mano_2_alt1.png","mano_2_alt2.png"];
    }
    else if(numeroActual == 3){
        formas = ["mano_3.png","mano_3_alt1.png","mano_3_alt2.png"];
    }
    else{
        formas = ["mano_" + numeroActual + ".png"];
    }

    let textos = [
        "Una forma es esta",
        "También puedes hacerlo así",
        "Otra forma es esta"
    ];

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">${textos[subPaso]}</div>
        <div class="manos">
            <img src="${formas[subPaso]}" class="mano">
        </div>
        <button class="boton" onclick="siguienteForma(${formas.length})">
            ${subPaso < formas.length-1 ? "Otra forma" : "Siguiente"}
        </button>
    `;

    hablar(textos[subPaso]);
}

/* SIGUIENTE UNA MANO */
function siguienteForma(total){
    subPaso++;

    if(subPaso < total){
        mostrarFormasUnaMano();
    }else{
        subPasoDosManos = 0;
        pantallaDosManos();
    }
}

/* DOS MANOS */
function pantallaDosManos(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="numero">${numeroActual}</div>
        <div class="texto">Ahora forma el ${numeroActual} con dos manos</div>
        <button class="boton" onclick="mostrarRespuestaDosManos()">Verificar</button>
    `;

    hablar("Ahora forma el " + numeroActual + " con dos manos");
}

/* RESPUESTAS DOS MANOS */
function mostrarRespuestaDosManos(){

    let combinaciones = [];

    if(numeroActual == 4){
        combinaciones = [[1,3],[2,2]];
    }
    else if(numeroActual == 5){
        combinaciones = [[1,4],[2,3]];
    }
    else{
        combinaciones = [[1,numeroActual-1]];
    }

    let textos = [
        "Una forma es esta",
        "También puedes hacerlo así"
    ];

    let izq = combinaciones[subPasoDosManos][0];
    let der = combinaciones[subPasoDosManos][1];

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">${textos[subPasoDosManos]}</div>
        <div class="manos">
            <img src="mano_${izq}.png" class="mano izq">
            <img src="mano_${der}.png" class="mano">
        </div>
        <button class="boton" onclick="siguienteDosManos(${combinaciones.length})">
            ${subPasoDosManos < combinaciones.length-1 ? "Otra forma" : "Siguiente"}
        </button>
    `;

    hablar(textos[subPasoDosManos]);
}

/* SIGUIENTE DOS MANOS */
function siguienteDosManos(total){
    subPasoDosManos++;

    if(subPasoDosManos < total){
        mostrarRespuestaDosManos();
    }else{
        siguienteNumero();
    }
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <h1>¡Muy bien!</h1>
        <p>Has trabajado con tus manos 👏</p>
        <button class="boton" onclick="portada()">Volver a empezar</button>
    `;

    hablar("Muy bien, has trabajado con tus manos");
}

/* START */
portada();

</script>

</body>
</html>
