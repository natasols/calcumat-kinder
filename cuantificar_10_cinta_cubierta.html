<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – Cinta cubierta hasta 10</title>

<style>

body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    margin:0;
}

/* CONTENEDOR */
.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:20px;
}

.logo-portada{ width:360px; }
.logo-app{ width:140px; }

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(10,90px);
    justify-content:center;
    margin-top:40px;
}

/* CASILLA */
.casilla{
    width:90px;
    height:80px;
    border:3px solid #0d2b45;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    position:relative;
}

/* FICHA GRANDE (CLAVE) */
.ficha{
    width:75px;
    height:75px;
    background:#f44336;
    border-radius:50%;
    position:absolute;
}

/* FICHA LEVANTADA */
.ficha-extra{
    width:75px;
    height:75px;
    background:#f44336;
    border-radius:50%;
    position:absolute;
    top:-85px;
}

/* FOOTER */
.footer{
    padding:20px;
}

.boton{
    padding:15px 30px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.reloj{
    font-size:70px;
}

.oculto{
    visibility:hidden;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

let cantidad = 0;
let ejercicio = 0;
let total = 20;

/* VOZ */
function hablar(texto){
    let m = new SpeechSynthesisUtterance(texto);
    m.lang = "es-CL";
    let voz = speechSynthesis.getVoices().find(v => v.lang.includes("es"));
    if(voz) m.voice = voz;
    speechSynthesis.cancel();
    speechSynthesis.speak(m);
}

/* GENERAR */
function generarCantidad(){
    let r = Math.random();

    if(r < 0.8){
        return Math.floor(Math.random()*7)+4;
    }else{
        return Math.floor(Math.random()*3)+1;
    }
}

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" class="logo-portada">
                <h2>Cuantificar hasta 10</h2>
                <p>Cinta numerada – parte 2</p>
            </div>

            <div class="main"></div>

            <div class="footer">
                <button class="boton" onclick="iniciar()">Iniciar</button>
            </div>

        </div>
    `;
}

/* INICIO */
function iniciar(){
    ejercicio = 0;
    nuevoEjercicio();
}

/* NUEVO EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    cantidad = generarCantidad();

    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" class="logo-app">
                <h2>¿Cuántas hay?</h2>
                <div>Ejercicio ${ejercicio} de ${total}</div>
            </div>

            <div class="main">
                <div id="cinta"></div>
            </div>

            <div id="footer" class="footer">
                <button class="boton" onclick="iniciarEjercicio()">Iniciar ejercicio</button>
            </div>

        </div>
    `;
}

/* INICIAR */
function iniciarEjercicio(){

    let cinta = document.getElementById("cinta");
    cinta.className = "cinta";
    cinta.innerHTML = "";

    for(let i=1;i<=10;i++){

        let cas = document.createElement("div");
        cas.className="casilla";

        if(i <= cantidad){
            cas.innerHTML = `<div class="ficha"></div>`;
        }else{
            cas.innerText = i;
        }

        cinta.appendChild(cas);
    }

    document.getElementById("footer").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultarTodo,3000);
}

/* OCULTAR */
function ocultarTodo(){

    document.getElementById("cinta").classList.add("oculto");

    document.getElementById("footer").innerHTML = `
        <button class="boton" onclick="mostrarRespuesta()">Verificar</button>
    `;
}

/* VERIFICAR */
function mostrarRespuesta(){

    let cinta = document.getElementById("cinta");
    cinta.classList.remove("oculto");

    let casillas = document.querySelectorAll(".casilla");

    let ultima = casillas[cantidad - 1];

    ultima.innerHTML = `
        ${cantidad}
        <div class="ficha-extra"></div>
    `;

    hablar("Hay " + cantidad);

    document.getElementById("footer").innerHTML = `
        <button class="boton" onclick="nuevoEjercicio()">Siguiente</button>
    `;
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" class="logo-portada">
                <h2>¡Muy bien!</h2>
            </div>

            <div class="footer">
                <button class="boton" onclick="mostrarPortada()">Volver</button>
            </div>

        </div>
    `;
}

mostrarPortada();

</script>

</body>
</html>
