<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Cinta Descubierta</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.portada{
    margin-top:80px;
}

.boton{
    margin:10px;
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* 🔴 FILA DE PUNTOS */
.fila-puntos{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
    margin-top:30px;
    margin-bottom:18px; /* 👈 separación estética */
}

/* 🔢 CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
}

/* CASILLAS */
.casilla{
    width:80px;
    height:60px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    background:white;
}

.numero{
    font-weight:bold;
}

/* 🔴 FICHAS CON ANIMACIÓN */
.punto{
    width:45px;
    height:45px;
    border-radius:50%;
    background:red;
    margin:auto;

    opacity:0;
    transform:scale(0.6);
    animation: aparecer 0.2s ease-out forwards;
}

@keyframes aparecer{
    to{
        opacity:1;
        transform:scale(1);
    }
}

.opciones{
    margin-top:30px;
}

.mensaje{
    font-size:22px;
    margin-top:15px;
    height:30px;
}
</style>
</head>

<body>

<div id="pantalla"></div>

<script>

/* 🔊 VOZ */
function hablar(texto){
    let mensaje = new SpeechSynthesisUtterance(texto);
    mensaje.lang = "es-ES";
    mensaje.rate = 0.8;
    mensaje.pitch = 1.1;

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.startsWith("es"));
    if(voz) mensaje.voice = voz;

    speechSynthesis.speak(mensaje);
}

/* VARIABLES */
let ejercicio = 0;
let total = 20;
let cantidad = 0;
let aciertos = 0;
let anterior = -1;

/* PORTADA */
function iniciarApp(){
    document.getElementById("pantalla").innerHTML = `
        <div class="portada">
            <img src="logo.png" class="logo">
            <h1>Calcumat Kinder</h1>
            <p><b>Nivel:</b> Kinder</p>
            <p><b>Habilidad:</b> cuantificar hasta 6 en cinta descubierta</p>
            <button class="boton" onclick="nuevoEjercicio()">INICIAR</button>
        </div>
    `;
}

/* EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    do{
        cantidad = Math.floor(Math.random()*6)+1;
    }while(cantidad === anterior);

    anterior = cantidad;

    let html = `
        <img src="logo.png" class="logo">
        <h2>¿Cuántas hay?</h2>
        <p>Ejercicio ${ejercicio} de 20</p>

        <div id="puntos" class="fila-puntos"></div>
        <div id="cinta" class="cinta"></div>

        <div id="botones" class="opciones"></div>
        <div id="mensaje" class="mensaje"></div>
    `;

    document.getElementById("pantalla").innerHTML = html;

    let puntos = document.getElementById("puntos");
    let cinta = document.getElementById("cinta");

    for(let i=1;i<=6;i++){

        /* 🔴 FILA DE PUNTOS */
        let contPunto = document.createElement("div");

        if(i <= cantidad){
            let punto = document.createElement("div");
            punto.className = "punto";
            contPunto.appendChild(punto);
        }

        puntos.appendChild(contPunto);

        /* 🔢 CINTA NUMÉRICA */
        let casilla = document.createElement("div");
        casilla.className="casilla";

        let numero = document.createElement("div");
        numero.className = "numero";
        numero.innerText = i;

        casilla.appendChild(numero);
        cinta.appendChild(casilla);
    }

    let botones = document.getElementById("botones");

    for(let i=1;i<=6;i++){
        botones.innerHTML += `<button class="boton" onclick="verificar(${i})">${i}</button>`;
    }
}

/* VERIFICAR */
function verificar(resp){

    let mensaje = document.getElementById("mensaje");

    let botones = document.querySelectorAll(".boton");
    botones.forEach(b => b.disabled = true);

    if(resp == cantidad){

        aciertos++;
        mensaje.innerText = "¡Bien!";
        hablar("Bien. Hay " + cantidad + " fichas");

    }else{

        mensaje.innerText = "Intenta nuevamente";
        hablar("Intenta nuevamente");
    }

    setTimeout(nuevoEjercicio,1500);
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("pantalla").innerHTML = `
        <h1>RESULTADOS</h1>
        <p>Respuestas correctas: ${aciertos} de 20</p>
        <button class="boton" onclick="reiniciar()">REINICIAR</button>
    `;
}

function reiniciar(){
    ejercicio = 0;
    aciertos = 0;
    iniciarApp();
}

iniciarApp();

</script>

</body>
</html>
