<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Cinta cubierta 10</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.cinta{
    display:grid;
    grid-template-columns: repeat(10,70px);
    justify-content:center;
    margin-top:60px;
}

.casilla{
    width:70px;
    height:70px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    background:white;
    position:relative;
}

.ficha{
    width:55px;
    height:55px;
    background:red;
    border-radius:50%;
}

.ficha-extra{
    width:55px;
    height:55px;
    background:red;
    border-radius:50%;
    position:absolute;
    top:-65px;
}

.boton{
    margin:8px;
    padding:12px 18px;
    font-size:16px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.opciones{
    margin-top:60px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

let ejercicio = 0;
let total = 20;
let cantidad = 0;
let aciertos = 0;
let ultimoIndex = 0;

function iniciar(){
    ejercicio = 0;
    aciertos = 0;
    nuevoEjercicio();
}

function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    cantidad = Math.floor(Math.random()*9)+1; // 1 a 9
    ultimoIndex = cantidad - 1;

    let html = `
        <img src="logo.png" class="logo">
        <h2>¿Cuántas hay?</h2>
        <p>Ejercicio ${ejercicio} de 20</p>
        <div class="cinta">
    `;

    for(let i=1;i<=10;i++){

        if(i <= cantidad){
            html += `<div class="casilla"><div class="ficha"></div></div>`;
        }else{
            html += `<div class="casilla">${i}</div>`;
        }
    }

    html += `</div><div class="opciones">`;

    for(let i=1;i<=10;i++){
        html += `<button class="boton" onclick="verificar(${i})">${i}</button>`;
    }

    html += `</div>`;

    document.getElementById("app").innerHTML = html;
}

function verificar(resp){

    if(resp == cantidad){

        aciertos++;

        // mostrar número oculto + ficha arriba
        let casillas = document.querySelectorAll(".casilla");

        let casilla = casillas[ultimoIndex];

        // mostrar número
        casilla.innerHTML = `
            ${ultimoIndex+1}
            <div class="ficha-extra"></div>
        `;

        setTimeout(nuevoEjercicio,1200);

    }else{
        alert("Intenta nuevamente");
    }
}

function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <h1>RESULTADOS</h1>
        <p>Respuestas correctas: ${aciertos} de 20</p>
        <button class="boton" onclick="iniciar()">REINICIAR</button>
    `;
}

iniciar();

</script>

</body>
</html>
