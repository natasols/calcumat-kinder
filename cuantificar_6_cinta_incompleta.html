<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Cinta incompleta 6</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.portada{
    margin-top:80px;
}

.boton{
    margin:10px;
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.cinta{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
    margin-top:30px;
}

.casilla{
    width:80px;
    height:80px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    background:white;
}

.punto{
    width:50px;
    height:50px;
    border-radius:50%;
    background:red;
}

.opciones{
    margin-top:30px;
}

.mensaje{
    font-size:22px;
    margin-top:15px;
    height:30px;
}
</style>
</head>

<body>

<div id="pantalla"></div>

<script>

/* 🔊 VOZ */
function hablar(texto){
    let mensaje = new SpeechSynthesisUtterance(texto);
    mensaje.lang = "es-ES";
    mensaje.rate = 0.8;
    mensaje.pitch = 1.1;

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.startsWith("es"));
    if(voz) mensaje.voice = voz;

    speechSynthesis.speak(mensaje);
}

let ejercicio = 0;
let total = 20;
let cantidad = 0;
let aciertos = 0;
let anterior = -1;

/* PORTADA */
function iniciarApp(){
    document.getElementById("pantalla").innerHTML = `
        <div class="portada">
            <img src="logo.png" class="logo">
            <h1>Calcumat Kinder</h1>
            <p><b>Nivel:</b> Kinder</p>
            <p><b>Habilidad:</b> inferir cantidad en cinta incompleta</p>
            <button class="boton" onclick="nuevoEjercicio()">INICIAR</button>
        </div>
    `;
}

/* EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    do{
        cantidad = Math.floor(Math.random()*5)+1; 
        // 👈 importante: hasta 5 para que siempre haya espacio vacío
    }while(cantidad === anterior);

    anterior = cantidad;

    let html = `
        <img src="logo.png" class="logo">
        <h2>¿Cuántas hay?</h2>
        <p>Ejercicio ${ejercicio} de 20</p>
        <div id="cinta" class="cinta"></div>
        <div id="botones" class="opciones"></div>
        <div id="mensaje" class="mensaje"></div>
    `;

    document.getElementById("pantalla").innerHTML = html;

    let cinta = document.getElementById("cinta");

    for(let i=1;i<=6;i++){

        let div = document.createElement("div");
        div.className="casilla";

        if(i <= cantidad){
            div.innerHTML = `<div class="punto"></div>`;
        }
        else if(i === cantidad + 1){
            div.innerHTML = ""; // 🔥 casilla vacía correcta
        }
        else{
            div.innerText = i;
        }

        cinta.appendChild(div);
    }

    let botones = document.getElementById("botones");

    for(let i=1;i<=6;i++){
        botones.innerHTML += `<button class="boton" onclick="verificar(${i})">${i}</button>`;
    }
}

/* VERIFICAR */
function verificar(resp){

    let mensaje = document.getElementById("mensaje");

    let botones = document.querySelectorAll(".boton");
    botones.forEach(b => b.disabled = true);

    if(resp == cantidad){

        aciertos++;
        mensaje.innerText = "¡Bien!";

        hablar("Bien. Hay " + cantidad + " fichas");

        let casillas = document.querySelectorAll(".casilla");

        let casilla = casillas[cantidad - 1]; // última ficha

        // 🔥 mostrar número + levantar ficha
        casilla.innerHTML = `
            ${cantidad}
            <div class="punto" style="
                position:absolute;
                top:-60px;
            "></div>
        `;

    }else{

        mensaje.innerText = "Intenta nuevamente";
        hablar("Intenta nuevamente");
    }

    setTimeout(nuevoEjercicio,1500);
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("pantalla").innerHTML = `
        <h1>RESULTADOS</h1>
        <p>Respuestas correctas: ${aciertos} de 20</p>
        <button class="boton" onclick="reiniciar()">REINICIAR</button>
    `;
}

function reiniciar(){
    ejercicio = 0;
    aciertos = 0;
    iniciarApp();
}

iniciarApp();

</script>

</body>
</html>
