<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Formar dedos hasta 5</title>

<style>
body{
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    text-align:center;
    background:white;
    margin:0;
}

/* CONTENEDOR PORTADA */
.contenedor{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* LOGOS */
.logo{
    width:360px; /* MÁS GRANDE */
    margin-bottom:30px;
}

.logo-mini{
    width:90px;
    margin-top:20px;
}

/* NÚMERO */
.numero{
    font-size:150px;
    color:#d32f2f;
    margin:20px 0;
}

/* TEXTO */
.texto{
    font-size:26px;
    color:#333;
    margin-top:20px;
}

/* CONTADOR */
.contador{
    font-size:18px;
    margin-top:10px;
    color:#666;
}

/* MANOS */
.manos{
    display:flex;
    justify-content:center;
    gap:60px;
    margin:30px;
}

.mano{
    width:260px;
}

.mano.izq{
    transform: scaleX(-1);
}

/* BOTÓN */
.boton{
    padding:16px 28px;
    font-size:20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
    margin-top:25px;
}

.boton:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* VOZ */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";
    msg.rate = 0.9;

    let voces = speechSynthesis.getVoices();

    let voz = voces.find(v =>
        v.lang.includes("es") &&
        (v.name.toLowerCase().includes("female") ||
         v.name.toLowerCase().includes("google"))
    );

    if(voz) msg.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* VARIABLES */
let numeros = [2,3,4,5];
let secuencia = [];
let index = 0;
let numeroActual = 0;
let subPaso = 0;
let totalEjercicios = 4;

/* SECUENCIA */
function generarSecuencia(){
    secuencia = [...numeros];
    for(let i=secuencia.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        [secuencia[i],secuencia[j]] = [secuencia[j],secuencia[i]];
    }
}

/* PORTADA */
function portada(){
    document.getElementById("app").innerHTML = `
        <div class="contenedor">
            <img src="logo.png" class="logo">
            <div class="texto">Forma números con tus dedos</div>
            <button class="boton" onclick="iniciar()">Comenzar</button>
        </div>
    `;
}

/* INICIO */
function iniciar(){
    generarSecuencia();
    index = 0;
    siguienteNumero();
}

/* SIGUIENTE */
function siguienteNumero(){

    if(index >= totalEjercicios){
        final();
        return;
    }

    numeroActual = secuencia[index];
    index++;

    pantallaNumero();
}

/* UNA MANO */
function pantallaNumero(){
    document.getElementById("app").innerHTML = `
        <img src="logo_manos.png" class="logo-mini">
        <div class="contador">Ejercicio ${index} de ${totalEjercicios}</div>
        <div class="numero">${numeroActual}</div>
        <div class="texto">Forma el ${numeroActual} con una mano</div>
        <button class="boton" onclick="verificar()">Verificar</button>
    `;

    hablar("Forma el " + numeroActual + " con una mano");
}

/* VERIFICAR */
function verificar(){
    subPaso = 0;
    mostrarFormasUnaMano();
}

/* FORMAS */
function mostrarFormasUnaMano(){

    let formas = [];

    if(numeroActual == 2){
        formas = ["mano_2.png","mano_2_alt1.png","mano_2_alt2.png"];
    }
    else if(numeroActual == 3){
        formas = ["mano_3.png","mano_3_alt1.png","mano_3_alt2.png"];
    }
    else{
        formas = ["mano_" + numeroActual + ".png"];
    }

    document.getElementById("app").innerHTML = `
        <img src="logo_manos.png" class="logo-mini">
        <div class="texto">Una forma es esta</div>
        <div class="manos">
            <img src="${formas[subPaso]}" class="mano">
        </div>
        <button class="boton" onclick="siguienteForma(${formas.length})">
            ${subPaso < formas.length-1 ? "Otra forma" : "Siguiente"}
        </button>
    `;
}

/* SIGUIENTE FORMA */
function siguienteForma(total){
    subPaso++;

    if(subPaso < total){
        mostrarFormasUnaMano();
    }else{
        pantallaDosManos();
    }
}

/* DOS MANOS */
function pantallaDosManos(){
    subPaso = 0;

    document.getElementById("app").innerHTML = `
        <img src="logo_manos.png" class="logo-mini">
        <div class="numero">${numeroActual}</div>
        <div class="texto">Ahora forma el ${numeroActual} con dos manos</div>
        <button class="boton" onclick="mostrarRespuesta()">Verificar</button>
    `;
}

/* RESPUESTAS */
function mostrarRespuesta(){

    let combinaciones = [];

    if(numeroActual == 4){
        combinaciones = [[1,3],[2,2]];
    }
    else if(numeroActual == 5){
        combinaciones = [[1,4],[2,3]];
    }
    else if(numeroActual == 3){
        combinaciones = [[1,2]];
    }

    let c = combinaciones[subPaso];

    document.getElementById("app").innerHTML = `
        <img src="logo_manos.png" class="logo-mini">
        <div class="texto">Una forma es esta</div>
        <div class="manos">
            <img src="mano_${c[0]}.png" class="mano izq">
            <img src="mano_${c[1]}.png" class="mano">
        </div>
        <button class="boton" onclick="siguienteCombinacion(${combinaciones.length})">
            ${subPaso < combinaciones.length-1 ? "Otra forma" : "Siguiente"}
        </button>
    `;
}

/* SIGUIENTE COMBINACIÓN */
function siguienteCombinacion(total){
    subPaso++;

    if(subPaso < total){
        mostrarRespuesta();
    }else{
        siguienteNumero();
    }
}

/* FINAL */
function final(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">¡Muy bien! 👏</div>
        <button class="boton" onclick="portada()">Volver a jugar</button>
    `;
}

/* START */
portada();

</script>

</body>
</html>
