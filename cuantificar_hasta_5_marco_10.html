<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – ¿Cuántas hay?</title>

<style>

body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    margin:0;
    background:white;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    padding:10px 25px;
    font-size:14px;
    color:#777;
}

/* CONTENEDOR */
.wrapper{
    min-height:calc(100vh - 40px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* LOGO */
.logo{
    width:180px; /* más pequeño */
    margin-bottom:10px;
}

/* TITULO */
h2{
    margin:10px 0;
}

/* MARCO CONTINUO */
.marco{
    display:grid;
    grid-template-columns: repeat(5,100px);
    grid-template-rows: repeat(2,100px);
    border:4px solid #0d2b45;
}

.casilla{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* líneas internas */
.casilla{
    border-right:2px solid #0d2b45;
    border-bottom:2px solid #0d2b45;
}

/* eliminar bordes sobrantes */
.casilla:nth-child(5),
.casilla:nth-child(10){
    border-right:none;
}

.casilla:nth-child(n+6){
    border-bottom:none;
}

/* PUNTO GRANDE */
.punto{
    width:80px;
    height:80px;
    background:#f44336;
    border-radius:50%;
}

/* BOTON */
.boton{
    margin-top:20px;
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* RELOJ */
.reloj{
    font-size:70px;
    margin-top:20px;
}

/* OCULTO */
.oculto{
    visibility:hidden;
}

/* RESULTADO */
.resultado{
    display:flex;
    align-items:center;
    gap:60px;
    margin-top:20px;
}

.numero{
    font-size:100px;
    color:#e53935;
}

.manos{
    width:140px;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* VOZ */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.includes("es"));

    if(voz) msg.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* VARIABLES */
let cantidad = 0;
let ejercicio = 0;
let total = 20;
let anterior = -1;

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">
            <img src="logo.png" class="logo">
            <h2>¿Cuántas hay?</h2>
            <button class="boton" onclick="iniciar()">Iniciar</button>
        </div>
    `;
}

/* INICIO */
function iniciar(){
    ejercicio = 0;
    siguienteEjercicio();
}

/* NUEVO EJERCICIO */
function siguienteEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    do{
        cantidad = Math.floor(Math.random()*5)+1;
    }while(cantidad === anterior);

    anterior = cantidad;

    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <img src="logo.png" class="logo">

            <h2>¿Cuántas hay?</h2>
            <div>Ejercicio ${ejercicio} de ${total}</div>

            <div id="zonaAccion">
                <button class="boton" onclick="mostrarEjercicio()">Iniciar ejercicio</button>
            </div>

            <div id="marco" class="marco oculto"></div>

            <div id="resultado" class="resultado"></div>

        </div>
    `;
}

/* MOSTRAR EJERCICIO */
function mostrarEjercicio(){

    let marco = document.getElementById("marco");
    marco.innerHTML = "";
    marco.classList.remove("oculto");

    for(let i=0;i<10;i++){
        let div = document.createElement("div");
        div.className="casilla";

        if(i < cantidad){
            div.innerHTML = '<div class="punto"></div>';
        }

        marco.appendChild(div);
    }

    document.getElementById("zonaAccion").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultar,3000);
}

/* OCULTAR */
function ocultar(){

    document.getElementById("marco").classList.add("oculto");

    document.getElementById("zonaAccion").innerHTML = `
        <button class="boton" onclick="verificar()">Verificar</button>
    `;
}

/* VERIFICAR */
function verificar(){

    document.getElementById("marco").classList.remove("oculto");

    document.getElementById("resultado").innerHTML = `
        <img src="mano_${cantidad}.png" class="manos">
        <div class="numero">${cantidad}</div>
    `;

    hablar("Hay " + cantidad);

    document.getElementById("zonaAccion").innerHTML = `
        <button class="boton" onclick="siguienteEjercicio()">Siguiente</button>
    `;
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">
            <img src="logo.png" class="logo">
            <h2>¡Muy bien!</h2>
            <button class="boton" onclick="mostrarPortada()">Volver</button>
        </div>
    `;
}

mostrarPortada();

</script>

</body>
</html>
