<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Cinta Descubierta</title>

<style>
body{
    font-family: 'Nunito','Segoe UI',sans-serif;
    text-align:center;
    background:white;
    margin:0;
}

/* LOGOS */
.logo{
    width:320px;
    margin-top:20px;
}

.logo-mini{
    width:150px;
    margin-top:20px;
}

/* BOTONES */
.boton{
    margin:10px;
    padding:14px 26px;
    font-size:20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* CONTADOR */
.contador{
    margin-top:10px;
    font-size:18px;
    color:#555;
}

/* FILA PUNTOS */
.fila-puntos{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
    margin-top:30px;
    margin-bottom:20px;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
}

/* CASILLAS CUADRADAS */
.casilla{
    width:80px;
    height:80px; /* 🔥 CUADRADO PERFECTO */
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    position:relative;
}

/* FICHA (CASI LLENA EL CUADRADO) */
.punto{
    width:70px;
    height:70px;
    border-radius:50%;
    background:red;
}

/* RESPUESTA */
.correcto::after{
    content:"";
    position:absolute;
    width:70px;
    height:70px;
    border:3px solid #4CAF50;
    border-radius:50%;
}

/* RELOJ */
.reloj{
    font-size:60px;
    margin-top:20px;
}

/* OCULTAR */
.oculto{
    visibility:hidden;
}
</style>
</head>

<body>

<div id="pantalla"></div>

<script>

/* VOZ ESTABLE */
let vocesDisponibles = [];

speechSynthesis.onvoiceschanged = () => {
    vocesDisponibles = speechSynthesis.getVoices();
};

function hablar(texto){
    let m = new SpeechSynthesisUtterance(texto);
    m.lang = "es-CL";
    m.rate = 0.9;

    let voz = vocesDisponibles.find(v =>
        v.lang.includes("es") &&
        v.name.toLowerCase().includes("google")
    );

    if(voz) m.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(m);
}

/* VARIABLES */
let cantidad = 0;
let ejercicio = 0;
let total = 20;

/* PORTADA */
function portada(){
    document.getElementById("pantalla").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>Cuantificar hasta 6</h2>
        <button class="boton" onclick="iniciar()">Comenzar</button>
    `;
}

/* INICIO */
function iniciar(){
    ejercicio = 0;
    nuevoEjercicio();
}

/* NUEVO EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    cantidad = Math.floor(Math.random()*6)+1;

    document.getElementById("pantalla").innerHTML = `
        <img src="logo_manos.png" class="logo-mini">
        <h2>¿Cuántas hay?</h2>
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div id="puntos"></div>
        <div id="cinta"></div>

        <div id="botonera">
            <button class="boton" onclick="iniciarEjercicio()">INICIAR</button>
        </div>
    `;

    hablar("¿Cuántas hay?");
}

/* INICIAR */
function iniciarEjercicio(){

    let puntos = document.getElementById("puntos");
    let cinta = document.getElementById("cinta");

    puntos.className = "fila-puntos";
    cinta.className = "cinta";

    puntos.innerHTML = "";
    cinta.innerHTML = "";

    for(let i=1;i<=6;i++){

        let cont = document.createElement("div");

        if(i<=cantidad){
            let p = document.createElement("div");
            p.className="punto";
            cont.appendChild(p);
        }

        puntos.appendChild(cont);

        let cas = document.createElement("div");
        cas.className="casilla";
        cas.id="num"+i;
        cas.innerText=i;

        cinta.appendChild(cas);
    }

    document.getElementById("botonera").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultarTodo,3000);
}

/* OCULTAR */
function ocultarTodo(){

    document.getElementById("puntos").classList.add("oculto");
    document.getElementById("cinta").classList.add("oculto");

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="mostrarRespuesta()">VERIFICAR</button>
    `;
}

/* VERIFICAR */
function mostrarRespuesta(){

    document.getElementById("puntos").classList.remove("oculto");
    document.getElementById("cinta").classList.remove("oculto");

    let correcto = document.getElementById("num"+cantidad);
    correcto.classList.add("correcto");

    hablar("Había " + cantidad);

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="nuevoEjercicio()">SIGUIENTE</button>
    `;
}

/* FINAL */
function mostrarFinal(){

    document.getElementById("pantalla").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>¡Muy bien! 👏</h2>
        <button class="boton" onclick="portada()">Volver a jugar</button>
    `;

    hablar("Muy bien");
}

/* START */
portada();

</script>

</body>
</html>
