<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Formar dedos hasta 5</title>

<style>
body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    text-align:center;
    background:white;
}

.logo{
    width:120px;
    margin-top:20px;
}

.numero{
    width:120px;
    margin:20px auto;
}

.numero-texto{
    font-size:150px;
    color:#d32f2f;
}

.manos{
    display:flex;
    justify-content:center;
    gap:60px;
    margin:30px;
}

.mano{
    width:260px;
}

.mano.izq{
    transform: scaleX(-1);
}

.boton{
    padding:14px 22px;
    font-size:20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-top:20px;
}

.texto{
    font-size:26px;
    margin-top:20px;
}

.contador{
    font-size:18px;
    margin-top:10px;
    color:#555;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* 🔊 VOZ FEMENINA */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";
    msg.rate = 0.9;

    let voces = speechSynthesis.getVoices();

    let voz = voces.find(v =>
        v.lang.includes("es") &&
        (v.name.toLowerCase().includes("female") ||
         v.name.toLowerCase().includes("google") ||
         v.name.toLowerCase().includes("mujer"))
    );

    if(voz) msg.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

speechSynthesis.onvoiceschanged = () => {};

/* 🔢 VARIABLES */
let numeros = [2,3,4,5];
let secuencia = [];
let index = 0;
let numeroActual = 0;
let subPaso = 0;
let totalEjercicios = 4;

/* 🔀 MEZCLA SIN REPETICIÓN */
function generarSecuencia(){
    secuencia = [...numeros];
    for(let i=secuencia.length-1;i>0;i--){
        let j = Math.floor(Math.random()*(i+1));
        [secuencia[i],secuencia[j]] = [secuencia[j],secuencia[i]];
    }
}

/* 🏁 PORTADA */
function portada(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">Jugaremos a formar números con los dedos</div>
        <button class="boton" onclick="iniciar()">Comenzar</button>
    `;
}

/* 🚀 INICIO */
function iniciar(){
    generarSecuencia();
    index = 0;
    siguienteNumero();
}

/* 🔢 SIGUIENTE */
function siguienteNumero(){

    if(index >= totalEjercicios){
        final();
        return;
    }

    numeroActual = secuencia[index];
    index++;

    pantallaNumero();
}

/* 🎨 NÚMERO KINDER */
function renderNumero(n){

    if(n == 4){
        return `
        <svg viewBox="0 0 100 140">
            <line x1="25" y1="75" x2="65" y2="15"
                  stroke="#d32f2f" stroke-width="10" stroke-linecap="round"/>
            <line x1="25" y1="75" x2="75" y2="75"
                  stroke="#d32f2f" stroke-width="10" stroke-linecap="round"/>
            <line x1="65" y1="15" x2="65" y2="125"
                  stroke="#d32f2f" stroke-width="10" stroke-linecap="round"/>
        </svg>
        `;
    }

    return `<div class="numero-texto">${n}</div>`;
}

/* 🧩 PANTALLA 1 */
function pantallaNumero(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="contador">Ejercicio ${index} de ${totalEjercicios}</div>
        <div class="numero">${renderNumero(numeroActual)}</div>
        <div class="texto">Forma el ${numeroActual} con una mano</div>
        <button class="boton" onclick="verificar()">Verificar</button>
    `;

    hablar("Forma el " + numeroActual + " con una mano");
}

/* ✔ VERIFICAR */
function verificar(){
    subPaso = 0;
    mostrarFormasUnaMano();
}

/* 🖐 UNA MANO */
function mostrarFormasUnaMano(){

    let formas = [];

    if(numeroActual == 2){
        formas = ["mano_2.png","mano_2_alt1.png","mano_2_alt2.png"];
    }
    else if(numeroActual == 3){
        formas = ["mano_3.png","mano_3_alt1.png","mano_3_alt2.png"];
    }
    else{
        formas = ["mano_" + numeroActual + ".png"];
    }

    let textos = [
        "Una forma es esta",
        "También puedes hacerlo así",
        "Otra forma es esta"
    ];

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">${textos[subPaso]}</div>
        <div class="manos">
            <img src="${formas[subPaso]}" class="mano">
        </div>
        <button class="boton" onclick="siguienteForma(${formas.length})">
            ${subPaso < formas.length-1 ? "Otra forma" : "Siguiente"}
        </button>
    `;

    hablar(textos[subPaso]);
}

/* ➡ SIGUIENTE FORMA */
function siguienteForma(total){
    subPaso++;

    if(subPaso < total){
        mostrarFormasUnaMano();
    }else{
        pantallaDosManos();
    }
}

/* ✌ DOS MANOS */
function pantallaDosManos(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="numero">${renderNumero(numeroActual)}</div>
        <div class="texto">Ahora forma el ${numeroActual} con dos manos</div>
        <button class="boton" onclick="mostrarRespuesta()">Verificar</button>
    `;

    hablar("Ahora forma el " + numeroActual + " con dos manos");
}

/* 🧠 RESPUESTAS DOS MANOS */
function mostrarRespuesta(){

    let combinaciones = [];

    if(numeroActual == 4){
        combinaciones = [[1,3],[2,2]];
    }
    else if(numeroActual == 5){
        combinaciones = [[1,4],[2,3]];
    }
    else if(numeroActual == 3){
        combinaciones = [[1,2]];
    }
    else{
        combinaciones = [[1,1]];
    }

    let c = combinaciones[subPaso] || combinaciones[0];

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">Una forma es esta</div>
        <div class="manos">
            <img src="mano_${c[0]}.png" class="mano izq">
            <img src="mano_${c[1]}.png" class="mano">
        </div>
        <button class="boton" onclick="siguienteCombinacion(${combinaciones.length})">
            ${subPaso < combinaciones.length-1 ? "Otra forma" : "Siguiente"}
        </button>
    `;

    hablar("También se puede hacer así");
}

/* ➡ SIGUIENTE COMBINACIÓN */
function siguienteCombinacion(total){
    subPaso++;

    if(subPaso < total){
        mostrarRespuesta();
    }else{
        siguienteNumero();
    }
}

/* 🎉 FINAL */
function final(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <div class="texto">¡Muy bien! Lo hiciste excelente 👏</div>
        <button class="boton" onclick="portada()">Volver a jugar</button>
    `;

    hablar("Muy bien, lo hiciste excelente");
}

/* 🚀 START */
portada();

</script>

</body>
</html>
