<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – ¿Cuántas hay? hasta 5</title>

<style>

body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background:white;
    margin:0;
}

/* NAV */
.nav{
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:12px 25px;
    font-size:14px;
    color:#777;
}

.nav span{
    cursor:pointer;
}

/* CONTENEDOR */
.wrapper{
    min-height:calc(100vh - 50px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* LOGO PROTAGONISTA */
.logo{
    width:320px;
    margin-bottom:20px;
}

/* TITULOS */
h2{
    margin:10px 0;
    font-size:30px;
}

.contador{
    color:#555;
}

/* MARCO DE 10 */
.marco{
    display:grid;
    grid-template-columns: repeat(5,100px);
    grid-template-rows: repeat(2,100px);
    gap:10px;
    margin:30px 0;
}

.casilla{
    width:100px;
    height:100px;
    border:3px solid #0d2b45;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* PUNTO GRANDE */
.punto{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#f44336;
}

/* BOTON */
.boton{
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* RELOJ */
.reloj{
    font-size:70px;
}

/* OCULTO */
.oculto{
    visibility:hidden;
}

/* RESULTADO */
.resultado{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:60px;
    margin-top:20px;
}

.numero{
    font-size:100px;
    color:#e53935;
}

.manos{
    width:160px;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* NAV */
function irIndice(){
    window.location.href = "index.html";
}

function reiniciarApp(){
    mostrarPortada();
}

/* VOZ */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.includes("es"));

    if(voz) msg.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* VARIABLES */
let cantidad = 0;
let ejercicio = 0;
let total = 20;
let anterior = -1;

/* NAV HTML */
function navHTML(){
    return `
        <div class="nav">
            <span onclick="irIndice()">← Índice</span>
            <span onclick="reiniciarApp()">↺ Inicio</span>
        </div>
    `;
}

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        ${navHTML()}
        <div class="wrapper">
            <img src="logo.png" class="logo">
            <h2>¿Cuántas hay? hasta 5</h2>
            <button class="boton" onclick="iniciar()">Comenzar</button>
        </div>
    `;
}

/* INICIO */
function iniciar(){
    ejercicio = 0;
    siguienteEjercicio();
}

/* NUEVO EJERCICIO */
function siguienteEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    do{
        cantidad = Math.floor(Math.random()*5)+1;
    }while(cantidad === anterior);

    anterior = cantidad;

    document.getElementById("app").innerHTML = `
        ${navHTML()}
        <div class="wrapper">

            <img src="logo.png" class="logo">

            <h2>¿Cuántas hay?</h2>
            <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

            <div id="marco" class="marco"></div>

            <div id="zonaAccion">
                <button class="boton" onclick="iniciarEjercicio()">Iniciar</button>
            </div>

            <div id="resultado" class="resultado"></div>

        </div>
    `;

    let marco = document.getElementById("marco");

    for(let i=0;i<10;i++){
        let div = document.createElement("div");
        div.className="casilla";

        if(i < cantidad){
            div.innerHTML = '<div class="punto"></div>';
        }

        marco.appendChild(div);
    }
}

/* INICIAR EJERCICIO */
function iniciarEjercicio(){

    document.getElementById("zonaAccion").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultar,3000);
}

/* OCULTAR */
function ocultar(){

    document.getElementById("marco").classList.add("oculto");

    document.getElementById("zonaAccion").innerHTML = `
        <button class="boton" onclick="verificar()">Verificar</button>
    `;
}

/* VERIFICAR */
function verificar(){

    document.getElementById("marco").classList.remove("oculto");

    document.getElementById("resultado").innerHTML = `
        <img src="mano_${cantidad}.png" class="manos">
        <div class="numero">${cantidad}</div>
    `;

    hablar("Hay " + cantidad);

    document.getElementById("zonaAccion").innerHTML = `
        <button class="boton" onclick="siguienteEjercicio()">Siguiente</button>
    `;
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        ${navHTML()}
        <div class="wrapper">
            <img src="logo.png" class="logo">
            <h2>¡Muy bien!</h2>
            <button class="boton" onclick="mostrarPortada()">Volver a jugar</button>
        </div>
    `;
}

/* START */
mostrarPortada();

</script>

</body>
</html>
