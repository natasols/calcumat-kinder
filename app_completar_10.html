<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Didactimat – Completar 10</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

h1{
    margin-top:20px;
}

.marco{
    display:grid;
    grid-template-columns: repeat(5, 80px);
    grid-template-rows: repeat(2, 80px);
    gap:10px;
    justify-content:center;
    margin:30px;
}

.celda{
    width:80px;
    height:80px;
    border:5px solid black;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
}

.punto{
    width:50px;
    height:50px;
    background:red;
    border-radius:50%;
}

.botones{
    display:grid;
    grid-template-columns: repeat(5, 60px);
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

button{
    width:60px;
    height:60px;
    font-size:20px;
    border-radius:10px;
    border:none;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

#mensaje{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>¿Cuántos puntos hay?</h1>

<div class="marco" id="marco"></div>

<div class="botones" id="botones"></div>

<div id="mensaje"></div>

<script>
let cantidad = 0;

function generar(){
    const marco = document.getElementById("marco");
    marco.innerHTML = "";

    cantidad = Math.floor(Math.random()*10)+1;

    for(let i=0;i<10;i++){
        let celda = document.createElement("div");
        celda.className = "celda";

        if(i < cantidad){
            let punto = document.createElement("div");
            punto.className = "punto";
            celda.appendChild(punto);
        }

        marco.appendChild(celda);
    }

    document.getElementById("mensaje").innerText="";
}

function crearBotones(){
    const cont = document.getElementById("botones");

    for(let i=1;i<=10;i++){
        let btn = document.createElement("button");
        btn.innerText = i;

        btn.onclick = function(){
            if(i === cantidad){
                document.getElementById("mensaje").innerText="¡Muy bien!";
                setTimeout(generar,1000);
            }else{
                document.getElementById("mensaje").innerText="Intenta de nuevo";
            }
        };

        cont.appendChild(btn);
    }
}

crearBotones();
generar();
</script>

</body>
</html>
