<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – ¿Cuántas hay? hasta 5</title>

<style>

body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background:white;
    margin:0;
}

/* NAV */
.nav{
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:12px 25px;
    box-sizing:border-box;
    font-size:14px;
    color:#777;
}

.nav span{
    cursor:pointer;
    opacity:0.6;
}

.nav span:hover{
    opacity:1;
    color:#000;
}

/* CONTENEDOR */
.wrapper{
    min-height:calc(100vh - 50px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* LOGO */
.logo{
    width:220px;
    margin-top:10px;
}

/* TITULOS */
h2{
    margin:10px 0 5px 0;
    font-size:30px;
}

.contador{
    color:#555;
    margin-bottom:10px;
}

/* MARCO */
.marco{
    display:grid;
    grid-template-columns: repeat(5,80px);
    gap:8px;
    justify-content:center;
    margin:30px 0;
}

.casilla{
    width:80px;
    height:80px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
}

.punto{
    width:40px;
    height:40px;
    border-radius:50%;
    background:red;
}

/* BOTONES */
.boton{
    margin:5px;
    padding:12px 20px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* RELOJ */
.reloj{
    font-size:60px;
    margin-top:10px;
}

.oculto{
    visibility:hidden;
}

/* RESULTADO */
.resultado{
    font-size:90px;
    color:#e53935;
    margin-top:10px;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* NAV */
function irIndice(){
    window.location.href = "index.html";
}

function reiniciarApp(){
    mostrarPortada();
}

/* VOZ */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.includes("es"));

    if(voz) msg.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* VARIABLES */
let cantidad = 0;
let ejercicio = 0;
let total = 20;
let anterior = -1;
let respuestaUsuario = null;

/* NAV HTML */
function navHTML(){
    return `
        <div class="nav">
            <span onclick="irIndice()">← Índice</span>
            <span onclick="reiniciarApp()">↺ Inicio</span>
        </div>
    `;
}

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        ${navHTML()}
        <div class="wrapper">
            <img src="logo.png" class="logo">
            <h2>¿Cuántas hay? hasta 5</h2>
            <button class="boton" onclick="iniciar()">Comenzar</button>
        </div>
    `;
}

/* INICIO */
function iniciar(){
    ejercicio = 0;
    siguienteEjercicio();
}

/* NUEVO EJERCICIO */
function siguienteEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    do{
        cantidad = Math.floor(Math.random()*5)+1;
    }while(cantidad === anterior);

    anterior = cantidad;

    respuestaUsuario = null;

    document.getElementById("app").innerHTML = `
        ${navHTML()}
        <div class="wrapper">

            <img src="logo.png" class="logo">

            <h2>¿Cuántas hay?</h2>
            <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

            <div id="marco" class="marco"></div>

            <div id="botonera">
                <button class="boton" onclick="iniciarEjercicio()">Iniciar</button>
            </div>

            <div id="resultado" class="resultado"></div>

        </div>
    `;

    let marco = document.getElementById("marco");

    for(let i=0;i<5;i++){
        let div = document.createElement("div");
        div.className="casilla";

        if(i < cantidad){
            div.innerHTML = '<div class="punto"></div>';
        }

        marco.appendChild(div);
    }
}

/* INICIAR EJERCICIO */
function iniciarEjercicio(){

    document.getElementById("botonera").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultar,2500);
}

/* OCULTAR */
function ocultar(){

    document.getElementById("marco").classList.add("oculto");

    let botones = "";

    for(let i=1;i<=5;i++){
        botones += `<button class="boton" onclick="responder(${i})">${i}</button>`;
    }

    document.getElementById("botonera").innerHTML = botones;
}

/* RESPUESTA (1 intento) */
function responder(valor){

    if(respuestaUsuario !== null) return;

    respuestaUsuario = valor;

    let botones = document.querySelectorAll(".boton");
    botones.forEach(b => b.disabled = true);

    setTimeout(mostrarRespuesta,500);
}

/* MOSTRAR RESPUESTA */
function mostrarRespuesta(){

    document.getElementById("marco").classList.remove("oculto");
    document.getElementById("resultado").innerText = cantidad;

    hablar("Hay " + cantidad);

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="siguienteEjercicio()">Siguiente</button>
    `;
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        ${navHTML()}
        <div class="wrapper">
            <img src="logo.png" class="logo">
            <h2>¡Muy bien!</h2>
            <button class="boton" onclick="mostrarPortada()">Volver a jugar</button>
        </div>
    `;
}

/* START */
mostrarPortada();

</script>

</body>
</html>
