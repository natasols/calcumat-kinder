<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – Dado hasta 6</title>

<style>

body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background:white;
    margin:0;
}

.wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* LOGOS */
.logo-portada{
    width:260px;
    margin-top:40px;
}

.logo-app{
    width:200px;
    margin-top:30px;
}

/* TITULOS */
h2{
    margin:10px 0 5px 0;
}

.contador{
    color:#555;
    margin-bottom:10px;
}

/* ZONA CENTRAL (SIEMPRE FIJA) */
.contenedor{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:80px;
    margin:40px 0;
    min-height:200px; /* 🔥 clave: mantiene estructura */
}

/* DADO */
.dado{
    width:160px;
    height:160px;
    border:4px solid black;
    border-radius:25px;
    display:grid;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(3,1fr);
}

.punto{
    width:28px;
    height:28px;
    background:black;
    border-radius:50%;
    margin:auto;
}

/* MANOS */
.zona-manos{
    width:140px; /* 🔥 espacio reservado */
    display:flex;
    justify-content:center;
}

.manos{
    width:130px;
}

.espejo{
    transform: scaleX(-1);
}

/* NUMERO */
.resultado{
    width:100px; /* 🔥 espacio fijo */
    text-align:center;
    font-size:110px;
    color:#e53935;
}

/* BOTON */
.boton{
    margin-top:10px;
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.reloj{
    font-size:60px;
    margin-top:20px;
}

.oculto{
    visibility:hidden;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.includes("es"));

    if(voz) msg.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

let numero = 0;
let ejercicio = 0;
let total = 10;

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">
            <img src="logo.png" class="logo-portada">
            <h2>Cuantificar hasta 6 en el dado</h2>
            <button class="boton" onclick="iniciar()">Comenzar</button>
        </div>
    `;
}

/* DADO */
function generarDado(n){
    let posiciones = {
        1:[5],
        2:[1,9],
        3:[1,5,9],
        4:[1,3,7,9],
        5:[1,3,5,7,9],
        6:[1,3,4,6,7,9]
    };

    let html = "";
    for(let i=1;i<=9;i++){
        html += posiciones[n].includes(i)
            ? `<div class="punto"></div>`
            : `<div></div>`;
    }
    return html;
}

/* MANOS */
function obtenerManos(n){
    if(n === 6){
        return `
            <img src="mano_3.png" class="manos espejo">
            <img src="mano_3.png" class="manos">
        `;
    }
    return `<img src="mano_${n}.png" class="manos">`;
}

/* INICIO */
function iniciar(){
    ejercicio = 0;
    siguienteEjercicio();
}

/* EJERCICIO */
function siguienteEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    numero = Math.floor(Math.random()*6)+1;

    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <img src="logo_manos.png" class="logo-app">

            <h2>¿Cuántos puntos hay?</h2>
            <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

            <div class="contenedor">
                <div id="zonaManos" class="zona-manos"></div>
                <div id="dado" class="dado"></div>
                <div id="numero" class="resultado"></div>
            </div>

            <div id="botonera">
                <button class="boton" onclick="iniciarEjercicio()">Iniciar ejercicio</button>
            </div>

        </div>
    `;
}

/* ANIMACION */
function animarDado(final){
    let dado = document.getElementById("dado");
    let cambios = 0;

    let intervalo = setInterval(() => {
        let r = Math.floor(Math.random()*6)+1;
        dado.innerHTML = generarDado(r);

        cambios++;
        if(cambios > 10){
            clearInterval(intervalo);
            dado.innerHTML = generarDado(final);
        }
    }, 80);
}

/* INICIAR */
function iniciarEjercicio(){

    animarDado(numero);

    document.getElementById("botonera").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultar,3000);
}

/* OCULTAR */
function ocultar(){
    document.getElementById("dado").classList.add("oculto");

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="verificar()">Verificar</button>
    `;
}

/* VERIFICAR */
function verificar(){

    document.getElementById("dado").classList.remove("oculto");

    document.getElementById("numero").innerText = numero;
    document.getElementById("zonaManos").innerHTML = obtenerManos(numero);

    hablar("Hay " + numero);

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="siguienteEjercicio()">Siguiente</button>
    `;
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">
            <img src="logo.png" class="logo-portada">
            <h2>¡Muy bien!</h2>
            <button class="boton" onclick="mostrarPortada()">Volver a jugar</button>
        </div>
    `;
}

mostrarPortada();

</script>

</body>
</html>
