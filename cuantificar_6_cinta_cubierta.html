<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Cinta cubierta 6</title>

<style>

body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    text-align:center;
    background:white;
}

/* LOGOS */
.logo-portada{
    width:260px;
    margin-top:40px;
}

.logo-app{
    width:140px;
    margin-top:20px;
}

/* PORTADA */
.portada{
    margin-top:60px;
}

/* BOTONES */
.boton{
    margin:12px;
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* CONTADOR */
.contador{
    margin-top:10px;
    font-size:16px;
    color:#555;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
    margin-top:40px;
}

/* CASILLA (CUADRADA) */
.casilla{
    width:80px;
    height:80px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    position:relative;
}

/* FICHA */
.ficha{
    width:70px;
    height:70px;
    background:red;
    border-radius:50%;
}

/* FICHA LEVANTADA */
.ficha-extra{
    width:70px;
    height:70px;
    background:red;
    border-radius:50%;
    position:absolute;
    top:-75px;
}

/* RELOJ */
.reloj{
    font-size:60px;
    margin-top:20px;
}

/* OCULTAR */
.oculto{
    visibility:hidden;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* 🔊 VOZ ESTABLE */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";
    msg.rate = 0.9;

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.includes("es"));

    if(voz) msg.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* VARIABLES */
let cantidad = 0;
let ejercicio = 0;
let total = 20;

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        <div class="portada">
            <img src="logo.png" class="logo-portada">
            <h2>Cuantificar hasta 6</h2>
            <p>Cinta numerada · Parte 2</p>
            <button class="boton" onclick="iniciar()">Comenzar</button>
        </div>
    `;
}

/* INICIAR */
function iniciar(){
    ejercicio = 0;
    siguienteEjercicio();
}

/* NUEVO EJERCICIO */
function siguienteEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    cantidad = Math.floor(Math.random()*6)+1;

    document.getElementById("app").innerHTML = `
        <img src="logo_manos.png" class="logo-app">
        <h2>¿Cuántas hay?</h2>
        <div class="contador">Ejercicio ${ejercicio} de ${total}</div>

        <div id="cinta"></div>

        <div id="botonera">
            <button class="boton" onclick="iniciarEjercicio()">Iniciar ejercicio</button>
        </div>
    `;

    hablar("Observa con atención");
}

/* INICIAR EJERCICIO */
function iniciarEjercicio(){

    let cinta = document.getElementById("cinta");
    cinta.className = "cinta";
    cinta.innerHTML = "";

    for(let i=1;i<=6;i++){

        let cas = document.createElement("div");
        cas.className="casilla";

        if(i <= cantidad){
            cas.innerHTML = `<div class="ficha"></div>`;
        }else{
            cas.innerText = i;
        }

        cinta.appendChild(cas);
    }

    document.getElementById("botonera").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultarTodo,3000);
}

/* OCULTAR */
function ocultarTodo(){

    document.getElementById("cinta").classList.add("oculto");

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="mostrarRespuesta()">Verificar</button>
    `;
}

/* VERIFICAR */
function mostrarRespuesta(){

    let cinta = document.getElementById("cinta");
    cinta.classList.remove("oculto");

    let casillas = document.querySelectorAll(".casilla");

    let ultima = casillas[cantidad - 1];

    ultima.innerHTML = `
        ${cantidad}
        <div class="ficha-extra"></div>
    `;

    hablar("Había " + cantidad);

    document.getElementById("botonera").innerHTML = `
        <button class="boton" onclick="siguienteEjercicio()">Siguiente</button>
    `;
}

/* FINAL */
function mostrarFinal(){

    document.getElementById("app").innerHTML = `
        <div class="portada">
            <img src="logo.png" class="logo-portada">
            <h2>¡Muy bien!</h2>
            <p>Terminaste la rutina</p>
            <button class="boton" onclick="mostrarPortada()">Volver a jugar</button>
        </div>
    `;

    hablar("Muy bien. Terminaste la actividad");
}

/* START */
mostrarPortada();

</script>

</body>
</html>
