<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Didactimat – ¿Cuántas hay? (hasta 10)</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

.logo{
    width:120px;
    margin-top:20px;
}

.portada{
    margin-top:80px;
}

.boton{
    margin:10px;
    padding:15px 25px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.marco{
    display:grid;
    grid-template-columns: repeat(5,80px);
    grid-template-rows: repeat(2,80px);
    gap:8px;
    justify-content:center;
    margin-top:30px;
}

.casilla{
    width:80px;
    height:80px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ddd;
}

.punto{
    width:40px;
    height:40px;
    border-radius:50%;
    background:red;
}

.mensaje{
    font-size:22px;
    margin-top:15px;
    height:30px;
}
</style>
</head>

<body>

<div id="pantalla"></div>

<script>

/* 🔊 VOZ */
function hablar(texto){
    let mensaje = new SpeechSynthesisUtterance(texto);
    mensaje.lang = "es-ES";
    mensaje.rate = 0.8;
    mensaje.pitch = 1.1;

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.startsWith("es"));
    if(voz) mensaje.voice = voz;

    speechSynthesis.speak(mensaje);
}

/* VARIABLES */
let ejercicio = 0;
let total = 20;
let cantidad = 0;
let aciertos = 0;
let anterior = -1;

/* PORTADA */
function iniciarApp(){
    document.getElementById("pantalla").innerHTML = `
        <div class="portada">
            <img src="logo.png" class="logo">
            <h1>Didactimat</h1>
            <p><b>Nivel:</b> Kinder</p>
            <p><b>Habilidad:</b> reconocer cantidades hasta 10</p>
            <button class="boton" onclick="nuevoEjercicio()">INICIAR</button>
        </div>
    `;
}

/* NUEVO EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    do{
        cantidad = Math.floor(Math.random()*10)+1; // 1 a 10
    }while(cantidad === anterior);

    anterior = cantidad;

    let html = `
        <img src="logo.png" class="logo">
        <h2>¿Cuántas hay?</h2>
        <p>Ejercicio ${ejercicio} de 20</p>
        <div id="marco" class="marco"></div>
        <div id="botones"></div>
        <div id="mensaje" class="mensaje"></div>
    `;

    document.getElementById("pantalla").innerHTML = html;

    let marco = document.getElementById("marco");

    /* distribución tipo 5 + n */
    let arriba = Array(5).fill(0);
    let abajo = Array(5).fill(0);

    let extra = Math.max(0, cantidad - 5);
    let arribaCompleta = cantidad > 5 ? Math.random() < 0.5 : true;

    if(cantidad <= 5){
        for(let i=0;i<cantidad;i++) arriba[i]=1;
    }else{
        if(arribaCompleta){
            arriba = Array(5).fill(1);
            for(let i=0;i<extra;i++) abajo[i]=1;
        }else{
            abajo = Array(5).fill(1);
            for(let i=0;i<extra;i++) arriba[i]=1;
        }
    }

    let distribucion = arriba.concat(abajo);

    distribucion.forEach(v=>{
        let div = document.createElement("div");
        div.className="casilla";
        if(v===1){
            div.innerHTML='<div class="punto"></div>';
        }
        marco.appendChild(div);
    });

    let botones = document.getElementById("botones");

    for(let i=1;i<=10;i++){
        botones.innerHTML += `<button class="boton" onclick="verificar(${i})">${i}</button>`;
    }
}

/* VERIFICAR */
function verificar(resp){

    let mensaje = document.getElementById("mensaje");

    let botones = document.querySelectorAll(".boton");
    botones.forEach(b => b.disabled = true);

    if(resp == cantidad){

        aciertos++;

        mensaje.innerText = "¡Bien!";

        hablar("Bien. Hay " + cantidad + " fichas");

    }else{

        mensaje.innerText = "Intenta nuevamente";

        hablar("Intenta nuevamente");
    }

    setTimeout(nuevoEjercicio,1500);
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("pantalla").innerHTML = `
        <h1>RESULTADOS</h1>
        <p>Respuestas correctas: ${aciertos} de 20</p>
        <button class="boton" onclick="reiniciar()">REINICIAR</button>
    `;
}

function reiniciar(){
    ejercicio = 0;
    aciertos = 0;
    iniciarApp();
}

/* INICIO */
iniciarApp();

</script>

</body>
</html>
