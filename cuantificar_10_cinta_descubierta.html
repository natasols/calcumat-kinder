<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – Cinta hasta 10</title>

<style>

body{
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    margin:0;
    text-align:center;
}

/* CONTENEDOR */
.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
.header{
    margin-top:20px;
}

.logo-portada{
    width:360px;
}

.logo-app{
    width:150px;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* FILA PUNTOS */
.fila-puntos{
    display:grid;
    grid-template-columns: repeat(10,90px);
    margin-top:30px;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(10,90px);
}

/* CASILLA GRANDE */
.casilla{
    width:90px;
    height:80px;
    border:3px solid #0d2b45;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    position:relative;
}

/* CÍRCULO VERDE */
.correcto::after{
    content:"";
    position:absolute;
    width:60px;
    height:60px;
    border:4px solid #4CAF50;
    border-radius:50%;
}

/* FICHA */
.punto{
    width:65px;
    height:65px;
    border-radius:50%;
    background:#f44336;
    margin:auto;
}

/* FOOTER */
.footer{
    padding:20px;
}

.boton{
    padding:15px 30px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.reloj{
    font-size:70px;
}

.oculto{
    visibility:hidden;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

let cantidad = 0;
let ejercicio = 0;
let total = 20;

/* VOZ */
function hablar(texto){
    let m = new SpeechSynthesisUtterance(texto);
    m.lang = "es-CL";
    let voz = speechSynthesis.getVoices().find(v => v.lang.includes("es"));
    if(voz) m.voice = voz;
    speechSynthesis.cancel();
    speechSynthesis.speak(m);
}

/* GENERAR */
function generarCantidad(){
    let r = Math.random();

    if(r < 0.8){
        return Math.floor(Math.random()*7)+4;
    }else{
        return Math.floor(Math.random()*3)+1;
    }
}

/* PORTADA */
function mostrarPortada(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" class="logo-portada">
                <h2>Cuantificar hasta 10</h2>
                <p>Cinta numerada – parte 1</p>
            </div>

            <div class="main"></div>

            <div class="footer">
                <button class="boton" onclick="iniciar()">Iniciar</button>
            </div>

        </div>
    `;
}

/* INICIO */
function iniciar(){
    ejercicio = 0;
    nuevoEjercicio();
}

/* NUEVO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    cantidad = generarCantidad();

    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" class="logo-app">
                <h2>¿Cuántas hay?</h2>
                <div>Ejercicio ${ejercicio} de ${total}</div>
            </div>

            <div class="main">

                <div id="puntos"></div>
                <div id="cinta"></div>

            </div>

            <div id="footer" class="footer">
                <button class="boton" onclick="iniciarEjercicio()">Iniciar ejercicio</button>
            </div>

        </div>
    `;
}

/* INICIAR */
function iniciarEjercicio(){

    let puntos = document.getElementById("puntos");
    let cinta = document.getElementById("cinta");

    puntos.className = "fila-puntos";
    cinta.className = "cinta";

    puntos.innerHTML = "";
    cinta.innerHTML = "";

    for(let i=1;i<=10;i++){

        let cont = document.createElement("div");

        if(i<=cantidad){
            let p = document.createElement("div");
            p.className="punto";
            cont.appendChild(p);
        }

        puntos.appendChild(cont);

        let cas = document.createElement("div");
        cas.className="casilla";
        cas.id="num"+i;
        cas.innerText=i;

        cinta.appendChild(cas);
    }

    document.getElementById("footer").innerHTML = `<div class="reloj">⏳</div>`;

    setTimeout(ocultarTodo,3000);
}

/* OCULTAR */
function ocultarTodo(){

    document.getElementById("puntos").classList.add("oculto");
    document.getElementById("cinta").classList.add("oculto");

    document.getElementById("footer").innerHTML = `
        <button class="boton" onclick="mostrarRespuesta()">Verificar</button>
    `;
}

/* VERIFICAR */
function mostrarRespuesta(){

    document.getElementById("puntos").classList.remove("oculto");
    document.getElementById("cinta").classList.remove("oculto");

    let correcto = document.getElementById("num"+cantidad);
    correcto.classList.add("correcto");

    hablar("Hay " + cantidad);

    document.getElementById("footer").innerHTML = `
        <button class="boton" onclick="nuevoEjercicio()">Siguiente</button>
    `;
}

/* FINAL */
function mostrarFinal(){

    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" class="logo-portada">
                <h2>¡Muy bien!</h2>
            </div>

            <div class="footer">
                <button class="boton" onclick="mostrarPortada()">Volver</button>
            </div>

        </div>
    `;
}

mostrarPortada();

</script>

</body>
</html>
