<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – Completar cinta parte 2</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:white;
}

.logo{
    width:180px;
    margin-top:40px;
}

h2{
    margin-top:20px;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(10,80px);
    justify-content:center;
    margin-top:40px;
}

.casilla{
    width:80px;
    height:70px;
    border:2px solid #1f3b57;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    background:white;
    cursor:pointer;
}

/* OBJETIVO */
.objetivo{
    background:#f3e5ab;
}

/* TARJETA EN CINTA */
.tarjeta-cinta{
    background:#f3e5ab;
}

/* RESULTADOS */
.correcto{
    background:#4CAF50;
    color:white;
}

.incorrecto{
    background:#f44336;
    color:white;
}

/* BANCO */
.banco{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-top:30px;
}

.tarjeta{
    width:70px;
    height:60px;
    background:#f3e5ab;
    border:2px solid #d6c27a;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    cursor:grab;
}

/* BOTON */
.boton{
    margin-top:30px;
    padding:15px 30px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

let ejercicio = 0;
let total = 6;
let nivel = 1;

let cinta = new Array(10).fill(null);
let respuestas = new Array(10).fill(null);

let objetivos = [];
let indiceObjetivo = 0;

let verificado = false;

/* VOZ */
function hablar(texto){
    let m = new SpeechSynthesisUtterance(texto);
    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang === "es-CL") || voces.find(v => v.lang.startsWith("es"));
    if(voz) m.voice = voz;
    speechSynthesis.speak(m);
}

/* PORTADA */
function portada(){
    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <h1>Completar la cinta numerada hasta 10</h1>
        <p>Parte 2</p>
        <button class="boton" onclick="nuevoEjercicio()">Iniciar</button>
    `;
}

/* NUEVO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        final();
        return;
    }

    verificado = false;

    nivel = ejercicio <= 3 ? 1 : 2;

    cinta = new Array(10).fill(null);
    respuestas = new Array(10).fill(null);

    if(nivel === 1){
        cinta[0]=1; cinta[4]=5; cinta[9]=10;
    }else{
        cinta[0]=1; cinta[9]=10;
    }

    objetivos = [];
    for(let i=0;i<10;i++){
        if(cinta[i]===null) objetivos.push(i);
    }

    objetivos.sort(()=>Math.random()-0.5);
    indiceObjetivo=0;

    render();
}

/* RENDER */
function render(){

    document.getElementById("app").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>Completa la cinta</h2>
        <p>Ejercicio ${ejercicio} de ${total}</p>

        <div id="cinta" class="cinta"></div>
        <div id="banco" class="banco"></div>
        <button id="btnVerificar" class="boton" onclick="verificar()" disabled>Verificar</button>
    `;

    dibujarCinta();
    generarBanco();
    indicar();
}

/* CINTA */
function dibujarCinta(){

    let cont = document.getElementById("cinta");
    cont.innerHTML="";

    for(let i=0;i<10;i++){

        let div=document.createElement("div");
        div.className="casilla";

        if(i===objetivos[indiceObjetivo]){
            div.classList.add("objetivo");
        }

        if(cinta[i]!=null){
            div.innerText=cinta[i];
        }

        if(respuestas[i]!=null){
            div.innerText=respuestas[i];
            div.classList.add("tarjeta-cinta");
        }

        div.onclick=()=>devolver(i);

        div.ondragover=e=>e.preventDefault();
        div.ondrop=e=>soltar(e,i);

        cont.appendChild(div);
    }
}

/* BANCO */
function generarBanco(){

    let banco=document.getElementById("banco");
    banco.innerHTML="";

    let nums=[];

    for(let i=1;i<=10;i++){
        if(!cinta.includes(i)){
            nums.push(i);
        }
    }

    nums.sort(()=>Math.random()-0.5);

    nums.forEach(n=>{
        let t=document.createElement("div");
        t.className="tarjeta";
        t.innerText=n;
        t.draggable=true;

        t.ondragstart=e=>{
            e.dataTransfer.setData("num",n);
        };

        banco.appendChild(t);
    });
}

/* SOLTAR */
function soltar(e,pos){

    if(verificado) return;

    let num=Number(e.dataTransfer.getData("num"));

    if(pos!==objetivos[indiceObjetivo]) return;

    respuestas[pos]=num;

    // eliminar del banco
    document.querySelectorAll(".tarjeta").forEach(t=>{
        if(Number(t.innerText)===num) t.remove();
    });

    indiceObjetivo++;

    if(indiceObjetivo<objetivos.length){
        dibujarCinta();
        indicar();
    }else{
        dibujarCinta();
        document.getElementById("btnVerificar").disabled=false;
    }
}

/* DEVOLVER */
function devolver(pos){

    if(verificado) return;

    if(respuestas[pos]!=null){

        let num=respuestas[pos];
        respuestas[pos]=null;

        let banco=document.getElementById("banco");

        let t=document.createElement("div");
        t.className="tarjeta";
        t.innerText=num;
        t.draggable=true;

        t.ondragstart=e=>{
            e.dataTransfer.setData("num",num);
        };

        banco.appendChild(t);

        // retroceder secuencia
        indiceObjetivo--;
        dibujarCinta();
    }
}

/* INDICAR */
function indicar(){
    hablar("Ubica el número que va aquí");
}

/* VERIFICAR */
function verificar(){

    verificado=true;

    let casillas=document.querySelectorAll(".casilla");

    let todoBien=true;

    for(let i=0;i<10;i++){

        if(respuestas[i]!=null){

            if(respuestas[i]===i+1){
                casillas[i].classList.add("correcto");
            }else{
                casillas[i].classList.add("incorrecto");
                todoBien=false;

                // devolver incorrectas
                let num=respuestas[i];
                respuestas[i]=null;

                let banco=document.getElementById("banco");

                let t=document.createElement("div");
                t.className="tarjeta";
                t.innerText=num;
                t.draggable=true;

                t.ondragstart=e=>{
                    e.dataTransfer.setData("num",num);
                };

                banco.appendChild(t);
            }
        }
    }

    if(todoBien){
        hablar("Muy bien, completaste la cinta");
    }else{
        hablar("Inténtalo otra vez");
    }

    document.getElementById("btnVerificar").innerText="Siguiente";
    document.getElementById("btnVerificar").onclick=nuevoEjercicio;
}

/* FINAL */
function final(){
    document.getElementById("app").innerHTML=`
        <h1>¡Excelente!</h1>
        <p>Terminaste todas las actividades</p>
        <button class="boton" onclick="reiniciar()">Reiniciar</button>
    `;
}

function reiniciar(){
    ejercicio=0;
    portada();
}

/* INICIO */
portada();

</script>

</body>
</html>
