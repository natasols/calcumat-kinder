<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Completar la cinta numerada hasta 10 - Parte 2</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:white;
}

/* LOGO */
.logo{
    width:200px;
    margin-top:30px;
}

/* TITULOS */
h1{
    font-size:28px;
}

h2{
    margin-top:20px;
}

/* BOTONES */
.boton{
    margin-top:20px;
    padding:15px 30px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(10,90px);
    justify-content:center;
    margin-top:30px;
}

.casilla{
    width:90px;
    height:90px;
    border:2px solid #1f3b57;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    background:white;
}

/* ESTADOS */
.activa{
    background:#f6e7a1;
}

.correcto{
    background:#bfe3bf !important;
    color:#1b5e20;
}

.incorrecto{
    background:#f5c6c6 !important;
    color:#b71c1c;
}

/* TARJETAS */
.banco{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
    margin-top:30px;
}

.tarjeta{
    width:80px;
    height:80px;
    background:#f6e7a1;
    border-radius:10px;
    font-size:26px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border:2px solid #d4c27a;
}

/* OCULTA */
.oculto{
    visibility:hidden;
}

</style>
</head>

<body>

<div id="pantalla"></div>

<script>

let ejercicio = 0;
let total = 6;

let nivel = 1;
let orden = [];
let indiceActual = 0;

let respuestas = Array(10).fill(null);

/* VOZ */
function hablar(texto){
    let m = new SpeechSynthesisUtterance(texto);
    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang === "es-CL") || voces.find(v => v.lang.startsWith("es"));
    if(voz) m.voice = voz;
    m.rate = 0.9;
    m.pitch = 1.1;
    speechSynthesis.speak(m);
}

/* PORTADA */
function portada(){
    document.getElementById("pantalla").innerHTML = `
        <img src="logo.png" class="logo">
        <h1>Completar la cinta numerada hasta 10</h1>
        <h2>Parte 2</h2>
        <button class="boton" onclick="nuevoEjercicio()">INICIAR</button>
    `;
}

/* NUEVO EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        final();
        return;
    }

    nivel = ejercicio <= 3 ? 1 : 2;

    respuestas = Array(10).fill(null);

    let fijos = nivel === 1 ? [1,5,10] : [1,10];

    fijos.forEach(n=>{
        respuestas[n-1] = n;
    });

    orden = [];
    for(let i=1;i<=10;i++){
        if(!fijos.includes(i)){
            orden.push(i-1);
        }
    }

    orden.sort(()=>Math.random()-0.5);

    indiceActual = 0;

    document.getElementById("pantalla").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>Completa la cinta</h2>
        <p>Ejercicio ${ejercicio} de ${total}</p>
        <div id="cinta" class="cinta"></div>
        <div id="banco" class="banco"></div>
        <button class="boton" onclick="verificar()">Verificar</button>
    `;

    dibujarCinta();
    dibujarBanco();

    marcarCasillaActual();
}

/* DIBUJAR CINTA */
function dibujarCinta(){

    let cinta = document.getElementById("cinta");
    cinta.innerHTML = "";

    for(let i=0;i<10;i++){

        let c = document.createElement("div");
        c.className = "casilla";
        c.dataset.index = i;

        if(respuestas[i] !== null){
            c.innerText = respuestas[i];

            if(respuestas[i] === i+1){
                c.classList.add("correcto"); // 👈 VERDE PERMANENTE
            }

        }

        c.onclick = ()=> devolver(i);

        cinta.appendChild(c);
    }
}

/* MARCAR CASILLA */
function marcarCasillaActual(){

    let casillas = document.querySelectorAll(".casilla");

    casillas.forEach(c => c.classList.remove("activa"));

    if(indiceActual < orden.length){
        casillas[orden[indiceActual]].classList.add("activa");
        hablar("Ubica el número que va en esta posición");
    }
}

/* BANCO */
function dibujarBanco(){

    let banco = document.getElementById("banco");
    banco.innerHTML = "";

    let fijos = nivel === 1 ? [1,5,10] : [1,10];

    let disponibles = [];

    for(let i=1;i<=10;i++){
        if(!fijos.includes(i)){
            disponibles.push(i);
        }
    }

    disponibles.sort(()=>Math.random()-0.5);

    disponibles.forEach(num=>{
        let t = document.createElement("div");
        t.className = "tarjeta";
        t.innerText = num;

        t.onclick = ()=> colocar(num, t);

        banco.appendChild(t);
    });
}

/* COLOCAR */
function colocar(num, tarjeta){

    if(indiceActual >= orden.length) return;

    let pos = orden[indiceActual];

    respuestas[pos] = num;

    tarjeta.remove();

    dibujarCinta();

    indiceActual++;

    if(indiceActual < orden.length){
        marcarCasillaActual();
    }
}

/* DEVOLVER */
function devolver(index){

    if(respuestas[index] === null) return;

    let num = respuestas[index];

    respuestas[index] = null;

    let banco = document.getElementById("banco");

    let t = document.createElement("div");
    t.className = "tarjeta";
    t.innerText = num;
    t.onclick = ()=> colocar(num, t);

    banco.appendChild(t);

    dibujarCinta();
}

/* VERIFICAR */
function verificar(){

    let casillas = document.querySelectorAll(".casilla");
    let todoBien = true;

    for(let i=0;i<10;i++){

        if(respuestas[i] !== null){

            if(respuestas[i] === i+1){
                casillas[i].classList.add("correcto");
            }else{
                casillas[i].classList.add("incorrecto");

                devolver(i);
                todoBien = false;
            }
        }
    }

    if(todoBien){
        hablar("Muy bien, completaste la cinta");
        setTimeout(nuevoEjercicio,1500);
    }else{
        hablar("Inténtalo otra vez");
    }
}

/* FINAL */
function final(){
    document.getElementById("pantalla").innerHTML = `
        <h1>¡Excelente trabajo!</h1>
        <button class="boton" onclick="portada()">Volver al inicio</button>
    `;
}

/* INICIO */
portada();

</script>

</body>
</html>
