<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Completar cinta numerada</title>

<style>

:root{
    --tam: 90px;
}

body{
    font-family:'Comic Sans MS','Trebuchet MS',sans-serif;
    margin:0;
    text-align:center;
    background:white;
}

.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
}

/* FLECHAS */
.flecha-nav{
    position:absolute;
    top:18px;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:16px;
    color:#9e9e9e;
    cursor:pointer;
    user-select:none;
    transition:0.2s;
}

.flecha-nav:hover{
    color:#616161;
    transform:scale(1.05);
}

.flecha-nav span{
    font-size:22px;
}

.flecha-indice{
    left:24px;
}

.flecha-inicio{
    right:24px;
}

/* HEADERS */
.header-portada{
    margin-top:55px;
}

.header-app{
    margin-top:14px;
}

.logo-portada{
    width:360px;
}

.logo-app{
    width:150px;
}

/* TEXTOS */
h1{
    font-size:36px;
    margin:22px 0 8px 0;
}

h2{
    font-size:30px;
    margin:10px 0 6px 0;
}

.bajada{
    font-size:24px;
    margin-top:0;
}

.contador{
    font-size:18px;
    margin-top:4px;
}

/* MAIN */
.main{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:5px 0;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(10,var(--tam));
    margin-top:20px;
    border:3px solid #0d2b45;
    background:white;
}

.casilla{
    width:var(--tam);
    height:var(--tam);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    border-right:1px solid #0d2b45;
}

.casilla:last-child{
    border-right:none;
}

.fija{
    font-weight:bold;
}

/* TARJETAS */
.numero{
    width:var(--tam);
    height:var(--tam);
    background:#fff3b0;
    border:2px solid #e0c97f;
    color:#333;
    font-size:32px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    cursor:grab;
}

/* FEEDBACK */
.correcto{
    background:#a5d6a7 !important;
}

.incorrecto{
    background:#ef9a9a !important;
}

/* BANCO */
.banco{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:35px;
    flex-wrap:wrap;
    max-width:1000px;
}

/* FOOTER */
.footer{
    width:100%;
    min-height:90px;
    padding:5px 0 20px 0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

.boton{
    padding:14px 28px;
    font-size:20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

@media (max-height:750px){
    :root{
        --tam: 78px;
    }

    .logo-app{
        width:120px;
    }

    h2{
        font-size:26px;
        margin:6px 0 4px 0;
    }

    .contador{
        font-size:16px;
    }

    .cinta{
        margin-top:10px;
    }

    .banco{
        margin-top:22px;
    }

    .footer{
        min-height:75px;
        padding-bottom:12px;
    }
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* NAVEGACIÓN */
function volverIndice(){
    window.location.href = "index_kinder.html";
}

function volverInicio(){
    portada();
}

/* VOZ */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";
    let voz = speechSynthesis.getVoices().find(v => v.lang.includes("es"));
    if(voz) msg.voice = voz;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

let ejercicio = 0;
let total = 6;

let cinta = [];
let faltantes = [];
let respuestas = {};

/* PORTADA */
function portada(){
    speechSynthesis.cancel();

    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="flecha-nav flecha-indice" onclick="volverIndice()">
                <span>←</span> Índice
            </div>

            <div class="header-portada">
                <img src="logo.png" class="logo-portada">
                <h1>¿Completemos la cinta numerada?</h1>
                <div class="bajada">Completar secuencia numérica hasta 10 · Parte 1</div>
            </div>

            <div class="main"></div>

            <div class="footer">
                <button class="boton" onclick="iniciar()">Iniciar</button>
            </div>
        </div>
    `;
}

function iniciar(){
    ejercicio = 0;
    siguiente();
}

/* NIVEL */
function obtenerNivel(){
    let ciclo = (ejercicio % 6);
    if(ciclo < 4) return 2;
    if(ciclo === 4) return 4;
    return 6;
}

/* NUEVO */
function siguiente(){

    ejercicio++;

    let cantidadFaltantes = obtenerNivel();

    cinta = Array.from({length:10}, (_,i)=>i+1);
    faltantes = [];
    respuestas = {};

    /* CLAVE: nunca falta el 1 */
    while(faltantes.length < cantidadFaltantes){
        let n = Math.floor(Math.random()*9)+2; // 2 a 10
        if(!faltantes.includes(n)){
            faltantes.push(n);
        }
    }

    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="flecha-nav flecha-indice" onclick="volverIndice()">
                <span>←</span> Índice
            </div>

            <div class="flecha-nav flecha-inicio" onclick="volverInicio()">
                <span>↻</span> Inicio
            </div>

            <div class="header-app">
                <img src="logo.png" class="logo-app">
                <h2>Completa la cinta numerada.</h2>
                <div class="contador">Ejercicio ${ejercicio} de ${total}</div>
            </div>

            <div class="main">
                <div id="cinta" class="cinta"></div>
                <div id="banco" class="banco"></div>
            </div>

            <div id="botonera" class="footer">
                <button class="boton" onclick="verificar()">Verificar</button>
            </div>

        </div>
    `;

    renderCinta();
    renderBanco();
}

/* CINTA */
function renderCinta(){

    let cont = document.getElementById("cinta");
    cont.innerHTML = "";

    cinta.forEach(n=>{

        let div = document.createElement("div");

        if(faltantes.includes(n)){
            div.className = "casilla";
            div.dataset.pos = n;

            div.ondragover = e => e.preventDefault();

            div.ondrop = function(e){
                e.preventDefault();

                let val = e.dataTransfer.getData("text");

                if(this.firstChild){
                    devolverAlBanco(this.firstChild.innerText);
                }

                let original = document.getElementById("num"+val);
                original.style.visibility = "hidden";

                let nueva = crearTarjeta(val, false);

                this.innerHTML = "";
                this.appendChild(nueva);

                respuestas[n] = parseInt(val);
            };

        }else{
            div.className = "casilla fija";
            div.innerText = n;
        }

        cont.appendChild(div);
    });
}

/* CREAR TARJETA */
function crearTarjeta(valor, draggable=true){

    let div = document.createElement("div");
    div.className = "numero";
    div.innerText = valor;

    if(draggable){
        div.id = "num"+valor;
        div.draggable = true;

        div.ondragstart = function(e){
            e.dataTransfer.setData("text", valor);
        };
    }else{
        div.draggable = true;

        div.ondragstart = function(e){
            e.dataTransfer.setData("text", valor);

            let parent = this.parentElement;
            parent.innerHTML = "";

            delete respuestas[parent.dataset.pos];

            let original = document.getElementById("num"+valor);
            original.style.visibility = "visible";
        };
    }

    return div;
}

/* BANCO */
function renderBanco(){

    let banco = document.getElementById("banco");
    banco.innerHTML = "";

    /* CLAVE: el 1 NO aparece en banco */
    let numeros = cinta.filter(n => n !== 1).sort(()=>Math.random()-0.5);

    numeros.forEach(n=>{
        let div = crearTarjeta(n, true);
        banco.appendChild(div);
    });
}

/* DEVOLVER */
function devolverAlBanco(valor){
    let original = document.getElementById("num"+valor);
    original.style.visibility = "visible";
}

/* VERIFICAR */
function verificar(){

    let todoCorrecto = true;

    faltantes.forEach(n=>{

        let cas = document.querySelector(`[data-pos='${n}']`);

        if(!cas.firstChild || respuestas[n] !== n){

            todoCorrecto = false;

            if(cas.firstChild){
                cas.firstChild.classList.add("incorrecto");

                let val = cas.firstChild.innerText;

                setTimeout(()=>{
                    devolverAlBanco(val);
                    cas.innerHTML = "";
                },800);
            }

        }else{
            cas.firstChild.classList.add("correcto");
        }

    });

    let botonera = document.getElementById("botonera");

    if(todoCorrecto){
        hablar("Muy bien, ubicaste todos los números");

        botonera.innerHTML = `
            <button class="boton" onclick="avanzar()">Siguiente</button>
        `;
    }else{
        hablar("Inténtalo otra vez");
    }
}

/* AVANZAR */
function avanzar(){
    if(ejercicio < total){
        siguiente();
    }else{
        mostrarFinal();
    }
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">

            <div class="flecha-nav flecha-indice" onclick="volverIndice()">
                <span>←</span> Índice
            </div>

            <div class="flecha-nav flecha-inicio" onclick="volverInicio()">
                <span>↻</span> Inicio
            </div>

            <div class="header-portada">
                <img src="logo.png" class="logo-portada">
                <h1>¡Muy bien!</h1>
                <div class="bajada">Completaste todas las cintas</div>
            </div>

            <div class="main"></div>

            <div class="footer">
                <button class="boton" onclick="portada()">Volver</button>
            </div>
        </div>
    `;
}

portada();

</script>

</body>
</html>
