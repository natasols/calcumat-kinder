<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat – Completar cinta</title>

<style>

body{
    font-family: 'Comic Sans MS', sans-serif;
    margin:0;
    text-align:center;
}

/* CONTENEDOR */
.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* HEADER */
.header{
    margin-top:20px;
}

.logo{
    width:280px;
}

/* CINTA NUMERADA */
.cinta{
    display:grid;
    grid-template-columns: repeat(10,70px);
    margin-top:40px;
    border:3px solid #0d2b45;
    background:#f5f5f5;
}

.casilla{
    width:70px;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
    border-right:1px solid #0d2b45;
}

.casilla:last-child{
    border-right:none;
}

.fija{
    background:#e0e0e0;
    font-weight:bold;
}

.vacia{
    background:#fafafa;
}

/* BANCO */
.banco{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:40px;
}

/* TARJETAS */
.numero{
    width:70px;
    height:70px;
    background:#fff3b0;
    border:2px solid #e0c97f;
    color:#333;
    font-size:26px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:8px;
    cursor:grab;
}

/* BOTÓN */
.boton{
    margin:30px;
    padding:12px 28px;
    font-size:18px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* MENSAJE */
.mensaje{
    font-size:22px;
    margin-top:15px;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* VOZ */
function hablar(texto){
    let msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-CL";
    let voz = speechSynthesis.getVoices().find(v => v.lang.includes("es"));
    if(voz) msg.voice = voz;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

let ejercicio = 0;
let total = 6;

let cinta = [];
let faltantes = [];

/* PORTADA */
function portada(){
    document.getElementById("app").innerHTML = `
        <div class="wrapper">
            <div class="header">
                <img src="logo.png" class="logo">
                <h2>Completar la cinta numerada</h2>
                <p>Números hasta 10</p>
            </div>
            <button class="boton" onclick="iniciar()">Iniciar</button>
        </div>
    `;
}

function iniciar(){
    ejercicio = 0;
    siguiente();
}

/* NIVELES */
function obtenerNivel(){
    let ciclo = (ejercicio % 6);
    if(ciclo < 4) return 2;
    if(ciclo === 4) return 4;
    return 6;
}

/* GENERAR EJERCICIO */
function siguiente(){

    ejercicio++;

    let cantidadFaltantes = obtenerNivel();

    cinta = Array.from({length:10}, (_,i)=>i+1);

    faltantes = [];

    while(faltantes.length < cantidadFaltantes){
        let n = Math.floor(Math.random()*10)+1;
        if(!faltantes.includes(n)){
            faltantes.push(n);
        }
    }

    let html = `
        <div class="wrapper">

            <div class="header">
                <img src="logo.png" width="140">
                <h2>Completa la cinta</h2>
                <p>Ejercicio ${ejercicio} de ${total}</p>
            </div>

            <div id="cinta" class="cinta"></div>

            <div id="banco" class="banco"></div>

            <button class="boton" onclick="verificar()">Verificar</button>

            <div id="mensaje" class="mensaje"></div>

        </div>
    `;

    document.getElementById("app").innerHTML = html;

    renderCinta();
    renderBanco();
}

/* CINTA */
function renderCinta(){

    let cont = document.getElementById("cinta");
    cont.innerHTML = "";

    cinta.forEach(n=>{

        let div = document.createElement("div");

        if(faltantes.includes(n)){
            div.className = "casilla vacia";
            div.dataset.pos = n;

            div.ondragover = e => e.preventDefault();

            div.ondrop = function(e){
                e.preventDefault();

                let val = parseInt(e.dataTransfer.getData("text"));

                /* VALIDACIÓN DIRECTA */
                if(val === n){
                    this.innerText = val;
                    document.getElementById("num"+val).remove();
                }else{
                    /* rebote visual opcional */
                    this.style.background = "#ffcdd2";
                    setTimeout(()=>{
                        this.style.background = "#fafafa";
                    },300);
                }
            };

        }else{
            div.className = "casilla fija";
            div.innerText = n;
        }

        cont.appendChild(div);
    });
}

/* BANCO */
function renderBanco(){

    let banco = document.getElementById("banco");

    let numeros = [...cinta].sort(()=>Math.random()-0.5);

    numeros.forEach(n=>{
        let div = document.createElement("div");
        div.className = "numero";
        div.innerText = n;
        div.id = "num"+n;

        div.draggable = true;

        div.ondragstart = function(e){
            e.dataTransfer.setData("text", n);
        };

        banco.appendChild(div);
    });
}

/* VERIFICAR */
function verificar(){

    document.getElementById("mensaje").innerText = "Los números van en orden del 1 al 10";

    hablar("Los números van en orden del 1 al 10");

    setTimeout(()=>{
        if(ejercicio < total){
            siguiente();
        }else{
            portada();
        }
    },2500);
}

portada();

</script>

</body>
</html>
