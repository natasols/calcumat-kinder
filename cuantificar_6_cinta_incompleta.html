<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calcumat Kinder – Cinta incompleta 6</title>

<style>
body{
    font-family: 'Nunito','Segoe UI',sans-serif;
    text-align:center;
    background:white;
    margin:0;
}

/* LOGO */
.logo{
    width:300px;
    margin-top:30px;
}

/* PORTADA */
.portada{
    margin-top:60px;
}

/* BOTONES */
.boton{
    margin:10px;
    padding:14px 26px;
    font-size:20px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* CINTA */
.cinta{
    display:grid;
    grid-template-columns: repeat(6,80px);
    justify-content:center;
    margin-top:30px;
}

/* CASILLAS CUADRADAS */
.casilla{
    width:80px;
    height:80px;
    border:2px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    background:white;
    position:relative;
}

/* FICHAS */
.punto{
    width:65px;
    height:65px;
    border-radius:50%;
    background:red;
}

/* OPCIONES */
.opciones{
    margin-top:30px;
}

/* MENSAJE */
.mensaje{
    font-size:22px;
    margin-top:15px;
    height:30px;
}
</style>
</head>

<body>

<div id="pantalla"></div>

<script>

/* 🔊 VOZ */
function hablar(texto){
    let mensaje = new SpeechSynthesisUtterance(texto);
    mensaje.lang = "es-CL";
    mensaje.rate = 0.9;

    let voces = speechSynthesis.getVoices();
    let voz = voces.find(v => v.lang.includes("es"));
    if(voz) mensaje.voice = voz;

    speechSynthesis.cancel();
    speechSynthesis.speak(mensaje);
}

let ejercicio = 0;
let total = 20;
let cantidad = 0;
let aciertos = 0;
let anterior = -1;

/* PORTADA */
function iniciarApp(){
    document.getElementById("pantalla").innerHTML = `
        <div class="portada">
            <img src="logo.png" class="logo">

            <h2>Cuantificar hasta 6</h2>
            <p>Cinta numerada · Parte 1</p>

            <button class="boton" onclick="nuevoEjercicio()">Comenzar</button>
        </div>
    `;
}

/* EJERCICIO */
function nuevoEjercicio(){

    ejercicio++;

    if(ejercicio > total){
        mostrarFinal();
        return;
    }

    do{
        cantidad = Math.floor(Math.random()*5)+1;
    }while(cantidad === anterior);

    anterior = cantidad;

    let html = `
        <img src="logo.png" style="width:140px; margin-top:15px;">
        <h2>¿Cuántas hay?</h2>
        <p>Ejercicio ${ejercicio} de ${total}</p>

        <div id="cinta" class="cinta"></div>
        <div id="botones" class="opciones"></div>
        <div id="mensaje" class="mensaje"></div>
    `;

    document.getElementById("pantalla").innerHTML = html;

    let cinta = document.getElementById("cinta");

    for(let i=1;i<=6;i++){

        let div = document.createElement("div");
        div.className="casilla";

        if(i <= cantidad){
            div.innerHTML = `<div class="punto"></div>`;
        }
        else if(i === cantidad + 1){
            div.innerHTML = "";
        }
        else{
            div.innerText = i;
        }

        cinta.appendChild(div);
    }

    let botones = document.getElementById("botones");

    for(let i=1;i<=6;i++){
        botones.innerHTML += `<button class="boton" onclick="verificar(${i})">${i}</button>`;
    }

    hablar("¿Cuántas hay?");
}

/* VERIFICAR */
function verificar(resp){

    let mensaje = document.getElementById("mensaje");

    let botones = document.querySelectorAll(".boton");
    botones.forEach(b => b.disabled = true);

    if(resp == cantidad){

        aciertos++;
        mensaje.innerText = "¡Bien!";

        hablar("Había " + cantidad);

        let casillas = document.querySelectorAll(".casilla");

        let casillaFicha = casillas[cantidad - 1];
        let casillaSiguiente = casillas[cantidad];

        let ficha = casillaFicha.querySelector(".punto");
        ficha.style.position = "absolute";
        ficha.style.top = "-60px";

        casillaFicha.innerHTML += `<span>${cantidad}</span>`;

        if(casillaSiguiente){
            casillaSiguiente.innerText = cantidad + 1;
        }

    }else{

        mensaje.innerText = "Intenta nuevamente";
        hablar("Intenta nuevamente");
    }

    setTimeout(nuevoEjercicio,1500);
}

/* FINAL */
function mostrarFinal(){
    document.getElementById("pantalla").innerHTML = `
        <img src="logo.png" class="logo">
        <h2>¡Muy bien! 👏</h2>
        <p>Buen trabajo pensando sin contar</p>
        <button class="boton" onclick="reiniciar()">Volver a jugar</button>
    `;

    hablar("Muy bien");
}

function reiniciar(){
    ejercicio = 0;
    aciertos = 0;
    iniciarApp();
}

/* START */
iniciarApp();

</script>

</body>
</html>
